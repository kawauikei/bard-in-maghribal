<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Rhythm Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --brave: #ef4444;
    --elegant: #a855f7;
    --mystic: #10b981;
    --gold: #fbbf24;
    --sky: #38bdf8;
    --ink: #07111f;
    --panel: rgba(8, 18, 32, 0.78);
    --panel-strong: rgba(10, 18, 32, 0.94);
    --line: rgba(255, 255, 255, 0.14);
    --muted: #9fb0c7;
}

* { box-sizing: border-box; }

html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
}

body {
    overflow: hidden;
    background:
        radial-gradient(circle at 20% 16%, rgba(16, 185, 129, 0.18), transparent 28%),
        radial-gradient(circle at 82% 20%, rgba(168, 85, 247, 0.22), transparent 32%),
        radial-gradient(circle at 50% 82%, rgba(239, 68, 68, 0.13), transparent 34%),
        #030712;
    color: #f8fafc;
    font-family: Outfit, "Noto Sans JP", sans-serif;
    user-select: none;
}

button,
select,
input {
    font: inherit;
}

#game-container {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    transform-origin: top left;
    background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.25), rgba(3, 7, 18, 0.8)),
        radial-gradient(circle at 50% 12%, rgba(56, 189, 248, 0.16), transparent 33%),
        #07111f;
}

#game-container::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent 76%);
}

#stage {
    position: absolute;
    inset: 0 0 520px 0;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
}

#visualizer-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

.stage-title {
    position: absolute;
    left: 48px;
    bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-shadow: 0 16px 40px rgba(0,0,0,0.55);
}

.stage-title .kicker {
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
}

.stage-title h1 {
    margin: 0;
    font-size: 54px;
    line-height: 1;
    letter-spacing: 0;
}

.stage-title .track-name {
    max-width: 820px;
    color: #dbeafe;
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#hud {
    position: absolute;
    left: 48px;
    top: 34px;
    z-index: 20;
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 14px;
}

.hud-item,
.meter-panel,
#settings-ui {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px);
}

.hud-item {
    min-width: 146px;
    padding: 12px 16px;
    border-radius: 8px;
}

.hud-label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.hud-value {
    margin-top: 2px;
    color: #ffffff;
    font-size: 28px;
    font-weight: 900;
    line-height: 1;
}

.hud-value.accent { color: var(--sky); }
.hud-value.combo { color: var(--gold); }
.hud-value.bump { animation: comboBump 150ms ease-out; }

@keyframes comboBump {
    0% { transform: scale(1); }
    45% { transform: scale(1.18); }
    100% { transform: scale(1); }
}

#settings-ui {
    position: absolute;
    top: 28px;
    right: 32px;
    z-index: 30;
    width: 720px;
    display: grid;
    grid-template-columns: 1.5fr 0.74fr 0.75fr 1fr 0.92fr;
    gap: 12px;
    padding: 14px;
    border-radius: 8px;
}

.control-group {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.control-group label,
.button-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

select,
input[type="range"] {
    width: 100%;
}

select {
    height: 38px;
    min-width: 0;
    padding: 0 10px;
    color: #f8fafc;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 6px;
    outline: none;
    font-size: 14px;
    font-weight: 700;
}

select:focus {
    border-color: rgba(168, 85, 247, 0.9);
}

input[type="range"] {
    height: 38px;
    accent-color: var(--elegant);
}

input[type="range"]:disabled {
    opacity: 0.42;
    cursor: not-allowed;
}

.range-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.range-val {
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
}

.toolbar-actions {
    grid-column: 4 / 6;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: end;
}

.btn-primary,
.btn-secondary {
    height: 38px;
    border-radius: 6px;
    border: 1px solid transparent;
    color: white;
    cursor: pointer;
    font-weight: 900;
    letter-spacing: 0.08em;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
}

.btn-primary {
    background: linear-gradient(135deg, #7c3aed, #0284c7);
    box-shadow: 0 10px 24px rgba(56, 189, 248, 0.18);
}

.btn-secondary {
    background: rgba(255,255,255,0.08);
    border-color: var(--line);
}

.btn-primary:hover,
.btn-secondary:hover {
    transform: translateY(-1px);
}

#field {
    position: absolute;
    inset: 560px 0 0 0;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 34px;
    padding: 34px 42px 38px 42px;
    background:
        linear-gradient(90deg, rgba(3, 7, 18, 0.86), rgba(15, 23, 42, 0.54)),
        rgba(15, 23, 42, 0.2);
}

#vocal-portrait-container {
    align-self: end;
    height: 448px;
    overflow: hidden;
    position: relative;
    background: #f4ecd8;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 8px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.36);
}

#vocal-canvas {
    display: block;
    width: 100%;
    height: 398px;
    background: #f4ecd8;
}

.vocal-name {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    color: #f8fafc;
    background: linear-gradient(90deg, #111827, #1f2937);
    border-top: 1px solid rgba(15, 23, 42, 0.2);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.08em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#lane-container {
    position: relative;
    min-width: 0;
    height: 448px;
}

.lane-path {
    position: absolute;
    left: 0;
    right: 112px;
    height: 90px;
    transform: translateY(-50%);
    border-radius: 8px;
    background:
        linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.12) 74%, rgba(255,255,255,0.04)),
        rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05);
}

.lane-path::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 3px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, transparent, currentColor 72%, transparent);
    opacity: 0.82;
    box-shadow: 0 0 18px currentColor;
}

.lane-path.mystic { top: 17%; color: var(--mystic); }
.lane-path.elegant { top: 50%; color: var(--elegant); }
.lane-path.brave { top: 83%; color: var(--brave); }

#judgment-line {
    position: absolute;
    left: 74%;
    top: 1%;
    bottom: 1%;
    width: 4px;
    border-radius: 999px;
    background: linear-gradient(to bottom, transparent, #ffffff 16%, #ffffff 84%, transparent);
    box-shadow: 0 0 28px rgba(255,255,255,0.82);
    z-index: 12;
}

#judgment-line::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 142px;
    height: 142px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent 64%);
}

#notes-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
}

.note {
    position: absolute;
    width: 76px;
    height: 76px;
    margin-left: -38px;
    margin-top: -38px;
    display: grid;
    place-items: center;
    will-change: transform;
}

.note-icon,
.btn-icon {
    position: relative;
    width: 64px;
    height: 64px;
    background-image: url("../assets/images/icon/icon_sheet_01_minigame_ui.webp");
    background-size: 800% 800%;
    image-rendering: pixelated;
    filter: drop-shadow(0 12px 14px rgba(0,0,0,0.45));
}

.note.mystic { color: var(--mystic); }
.note.elegant { color: var(--elegant); }
.note.brave { color: var(--brave); }
.mystic .note-icon,
.input-btn.mystic .btn-icon { background-position: 28.571% 42.857%; }
.elegant .note-icon,
.input-btn.elegant .btn-icon { background-position: 14.285% 42.857%; }
.brave .note-icon,
.input-btn.brave .btn-icon { background-position: 0% 42.857%; }

.input-btn {
    position: absolute;
    left: calc(74% + 74px);
    width: 92px;
    height: 92px;
    transform: translateY(-50%);
    z-index: 35;
    display: grid;
    place-items: center;
    border-radius: 50%;
    border: 3px solid currentColor;
    background: rgba(8, 18, 32, 0.94);
    box-shadow: 0 18px 35px rgba(0,0,0,0.38), inset 0 0 24px rgba(255,255,255,0.04);
    cursor: pointer;
    transition: box-shadow 70ms ease, background 70ms ease;
}

.input-btn.mystic { top: 17%; color: var(--mystic); }
.input-btn.elegant { top: 50%; color: var(--elegant); }
.input-btn.brave { top: 83%; color: var(--brave); }
.input-btn.active,
.input-btn:active {
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 30px currentColor, inset 0 0 18px currentColor;
}

.timing-rail {
    position: absolute;
    left: 0;
    right: 112px;
    bottom: -2px;
    height: 24px;
}

.timing-rail::before {
    content: "";
    position: absolute;
    left: calc(74% - 80px);
    width: 160px;
    top: 11px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
}

.timing-marker {
    position: absolute;
    left: 74%;
    top: 4px;
    width: 16px;
    height: 16px;
    margin-left: -8px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 16px #ffffff;
    opacity: 0;
    transform: translateX(0);
    transition: opacity 160ms ease;
}

.meter-panel {
    position: absolute;
    right: 36px;
    bottom: 34px;
    z-index: 25;
    width: 320px;
    padding: 12px 14px;
    border-radius: 8px;
}

.meter-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
}

.meter-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.meter-value {
    font-size: 18px;
    font-weight: 900;
}

.meter-bars {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 5px;
    margin-top: 10px;
}

.meter-bars span {
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
}

.meter-bars .lit { background: currentColor; box-shadow: 0 0 12px currentColor; }

.hit-text {
    position: absolute;
    z-index: 45;
    left: 74%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: #fff;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-shadow: 0 10px 24px rgba(0,0,0,0.8);
    animation: floatHit 520ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes floatHit {
    0% { opacity: 0; transform: translate(-50%, 14px) scale(0.72); }
    18% { opacity: 1; transform: translate(-50%, -8px) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -66px) scale(0.96); }
}

.hit-ring,
.spark {
    position: absolute;
    z-index: 42;
    pointer-events: none;
}

.hit-ring {
    width: 112px;
    height: 112px;
    margin-left: -56px;
    margin-top: -56px;
    border: 4px solid currentColor;
    border-radius: 50%;
    box-shadow: 0 0 20px currentColor;
    animation: burst 340ms ease-out forwards;
}

@keyframes burst {
    from { opacity: 1; transform: scale(0.52); }
    to { opacity: 0; transform: scale(1.7); }
}

.spark {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
    animation: spark 440ms ease-out forwards;
}

@keyframes spark {
    from { opacity: 1; transform: translate(0, 0) scale(1); }
    to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.15); }
}

#countdown-overlay,
.modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 80;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(3, 7, 18, 0.56);
    backdrop-filter: blur(10px);
}

#countdown-overlay.active,
.modal-overlay.active {
    display: flex;
}

#countdown-text {
    color: #ffffff;
    font-size: 150px;
    font-weight: 900;
    text-shadow: 0 0 42px rgba(168, 85, 247, 0.82);
    animation: countPulse 1000ms ease-out infinite;
}

#countdown-overlay.approach {
    align-items: flex-start;
    padding-top: 432px;
    background: transparent;
    backdrop-filter: none;
    pointer-events: none;
}

#countdown-overlay.approach #countdown-text {
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 8px;
    background: rgba(8, 18, 32, 0.68);
    font-size: 44px;
    letter-spacing: 0.12em;
}

@keyframes countPulse {
    from { opacity: 0.45; transform: scale(0.86); }
    35% { opacity: 1; transform: scale(1); }
    to { opacity: 0.7; transform: scale(0.92); }
}

.modal-content {
    width: 620px;
    padding: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-strong);
    box-shadow: 0 34px 80px rgba(0,0,0,0.48);
    text-align: center;
}

.modal-title {
    margin: 0 0 18px;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.08em;
}

.pause-stats {
    color: #dbeafe;
    font-size: 18px;
    font-weight: 700;
}

.modal-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 26px;
}

.result-rank {
    margin: 0 0 14px;
    font-size: 108px;
    line-height: 0.95;
    font-weight: 900;
    text-shadow: 0 0 34px currentColor;
}

.rank-S { color: var(--gold); }
.rank-A { color: var(--elegant); }
.rank-B { color: var(--sky); }
.rank-C { color: var(--mystic); }
.rank-D { color: #94a3b8; }

.result-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 18px;
}

.result-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    background: rgba(255,255,255,0.045);
    color: var(--muted);
    font-size: 15px;
    font-weight: 900;
}

.result-item span:last-child { color: #fff; }
.perfect span:last-child { color: var(--gold); }
.great span:last-child { color: #34d399; }
.good span:last-child { color: var(--sky); }
.miss span:last-child { color: #f87171; }
</style>
</head>
<body>
<div id="game-container">
    <section id="stage">
        <canvas id="visualizer-canvas"></canvas>
        <div id="hud">
            <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value accent" id="score-val">0</div></div>
            <div class="hud-item"><div class="hud-label">Combo</div><div class="hud-value combo" id="combo-val">0</div></div>
            <div class="hud-item"><div class="hud-label">Time</div><div class="hud-value" id="time-val">0.00</div></div>
            <div class="hud-item"><div class="hud-label">Accuracy</div><div class="hud-value" id="acc-val">--</div></div>
        </div>

        <div id="settings-ui">
            <div class="control-group">
                <label for="track-select">Track</label>
                <select id="track-select"></select>
            </div>
            <div class="control-group">
                <label for="density-select">Density</label>
                <select id="density-select">
                    <option value="1">Light</option>
                    <option value="2" selected>Standard</option>
                    <option value="3">Dense</option>
                </select>
            </div>
            <div class="control-group">
                <label for="window-select">Window</label>
                <select id="window-select">
                    <option value="250">Wide 250ms</option>
                    <option value="150" selected>Normal 150ms</option>
                    <option value="80">Tight 80ms</option>
                </select>
            </div>
            <div class="control-group">
                <div class="range-head"><label for="note-speed-input">Speed</label><span class="range-val" id="speed-val">180 px/s</span></div>
                <input type="range" id="note-speed-input" min="180" max="620" value="180" step="20">
            </div>
            <div class="control-group">
                <div class="range-head"><label for="offset">Offset</label><span class="range-val" id="offset-val">0 ms</span></div>
                <input type="range" id="offset" min="-250" max="250" value="0" step="5">
            </div>
            <div class="control-group">
                <label for="input-mode-select">Input</label>
                <select id="input-mode-select">
                    <option value="mouse" selected>Mouse</option>
                    <option value="touch">Touch</option>
                </select>
            </div>
            <div class="control-group">
                <div class="range-head"><label for="bgm-vol">BGM</label><span class="range-val" id="bgm-vol-val">80%</span></div>
                <input type="range" id="bgm-vol" min="0" max="100" value="80">
            </div>
            <div class="control-group">
                <div class="range-head"><label for="se-vol">Hit SE</label><span class="range-val" id="se-vol-val">OFF</span></div>
                <input type="range" id="se-vol" min="0" max="100" value="0" disabled>
            </div>
            <div class="toolbar-actions">
                <button id="play-btn" class="btn-primary">PLAY</button>
                <button id="calibrate-btn" class="btn-secondary">SYNC</button>
            </div>
        </div>

        <div class="stage-title">
            <div class="kicker">Elegant Rhythm Tester</div>
            <h1>Three-Lane Performance</h1>
            <div class="track-name" id="track-title">Loading rhythm data...</div>
        </div>
    </section>

    <section id="field">
        <div id="vocal-portrait-container">
            <canvas id="vocal-canvas"></canvas>
            <div class="vocal-name" id="vocal-tag">VOCAL</div>
        </div>

        <div id="lane-container">
            <div class="lane-path mystic"></div>
            <div class="lane-path elegant"></div>
            <div class="lane-path brave"></div>
            <div id="judgment-line"></div>
            <div id="notes-layer"></div>
            <button class="input-btn mystic" data-attr="mystic" aria-label="Mystic"><span class="btn-icon"></span></button>
            <button class="input-btn elegant" data-attr="elegant" aria-label="Elegant"><span class="btn-icon"></span></button>
            <button class="input-btn brave" data-attr="brave" aria-label="Brave"><span class="btn-icon"></span></button>
            <div class="timing-rail"><span class="timing-marker" id="timing-marker"></span></div>
        </div>
    </section>

    <div class="meter-panel" id="judge-meter">
        <div class="meter-row">
            <div class="meter-title">Last Judgment</div>
            <div class="meter-value" id="last-judge">READY</div>
        </div>
        <div class="meter-bars" id="meter-bars"><span></span><span></span><span></span><span></span></div>
    </div>

    <div id="countdown-overlay"><div id="countdown-text">3</div></div>

    <div id="pause-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">PAUSED</h2>
            <div class="pause-stats">Score <span id="pause-score">0</span> / Combo <span id="pause-combo">0</span></div>
            <div class="modal-actions">
                <button id="resume-btn" class="btn-primary">RESUME</button>
                <button id="restart-btn" class="btn-secondary">RESTART</button>
                <button id="exit-btn" class="btn-secondary">EXIT</button>
            </div>
        </div>
    </div>

    <div id="results-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">STAGE CLEAR</h2>
            <div id="res-rank" class="result-rank rank-S">S</div>
            <div class="result-grid">
                <div class="result-item perfect"><span>PERFECT</span><span id="res-perfect">0</span></div>
                <div class="result-item great"><span>GREAT</span><span id="res-great">0</span></div>
                <div class="result-item good"><span>GOOD</span><span id="res-good">0</span></div>
                <div class="result-item miss"><span>MISS</span><span id="res-miss">0</span></div>
                <div class="result-item"><span>MAX COMBO</span><span id="res-maxcombo">0</span></div>
                <div class="result-item"><span>TOTAL SCORE</span><span id="res-score">0</span></div>
            </div>
            <div class="modal-actions">
                <button id="res-retry-btn" class="btn-primary">RETRY</button>
                <button id="res-close-btn" class="btn-secondary">CLOSE</button>
                <button id="res-stop-btn" class="btn-secondary">STOP</button>
            </div>
        </div>
    </div>
</div>

<audio id="bgm-player" preload="auto"></audio>
<script src="rhythm_data.js"></script>
<script>
const ATTR = {
    mystic: { y: 0.17, color: "#10b981" },
    elegant: { y: 0.50, color: "#a855f7" },
    brave: { y: 0.83, color: "#ef4444" }
};
const ICON_POS = {
    brave: "0% 42.857%",
    elegant: "14.285% 42.857%",
    mystic: "28.571% 42.857%"
};
const AUDIO_BASE_DIR = "../assets/audio/vocal/";
const SPRITE_BASE_DIR = "../assets/images/game/";
const JUDGMENT_X_RATIO = 0.74;
const NOTE_SPAWN_X_RATIO = 0.03;
const RESULT_GRACE_SEC = 2.0;
const COUNTDOWN_SEC = 3.0;
const APPROACH_SEC = 1.25;
const LATE_MISS_MARGIN_SEC = 0.18;

const gameContainer = document.getElementById("game-container");
const player = document.getElementById("bgm-player");
const trackSelect = document.getElementById("track-select");
const densitySelect = document.getElementById("density-select");
const inputModeSelect = document.getElementById("input-mode-select");
const windowSelect = document.getElementById("window-select");
const speedInput = document.getElementById("note-speed-input");
const speedVal = document.getElementById("speed-val");
const offsetInput = document.getElementById("offset");
const offsetVal = document.getElementById("offset-val");
const bgmVol = document.getElementById("bgm-vol");
const bgmVolVal = document.getElementById("bgm-vol-val");
const seVol = document.getElementById("se-vol");
const seVolVal = document.getElementById("se-vol-val");
const playBtn = document.getElementById("play-btn");
const calibrateBtn = document.getElementById("calibrate-btn");
const notesLayer = document.getElementById("notes-layer");
const laneContainer = document.getElementById("lane-container");
const countdownOverlay = document.getElementById("countdown-overlay");
const countdownText = document.getElementById("countdown-text");
const pauseModal = document.getElementById("pause-modal");
const resultsModal = document.getElementById("results-modal");
const timingMarker = document.getElementById("timing-marker");
const lastJudge = document.getElementById("last-judge");
const meterBars = document.getElementById("meter-bars");
const scoreValEl = document.getElementById("score-val");
const comboValEl = document.getElementById("combo-val");
const timeValEl = document.getElementById("time-val");
const accValEl = document.getElementById("acc-val");
const trackTitle = document.getElementById("track-title");

let tracksData = [];
let songEmotionsData = {};
let currentNotes = [];
let noteSpeed = Number(speedInput.value);
let isPlaying = false;
let isPaused = false;
let isCountingDown = false;
let isApproaching = false;
let countdownStart = 0;
let approachStart = 0;
let songStartPerformance = 0;
let gameTime = 0;
let loopId = 0;
let score = 0;
let combo = 0;
let maxCombo = 0;
let perfects = 0;
let greats = 0;
let goods = 0;
let misses = 0;
let lateHits = [];

function resizeGame() {
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    gameContainer.style.transform = `scale(${scale})`;
    gameContainer.style.width = "1920px";
    gameContainer.style.height = "1080px";
}

window.addEventListener("resize", resizeGame);
resizeGame();

function cleanSongName(name) {
    return String(name || "")
        .replace(/\.mp3$/i, "")
        .replace(/^song_(special_)?[\d_]+[a-z]*_?/i, "")
        .slice(0, 80) || "Untitled";
}

function getTrackFile(track) {
    return track && track.generated && track.generated[0] ? track.generated[0] : `${track.id}.mp3`;
}

function getTrackBase(track) {
    return getTrackFile(track).replace(/\.mp3$/i, "");
}

function playSE() {
    // Intentionally silent: hit feedback is visual only in this tester.
}

function populateTracks() {
    trackSelect.innerHTML = "";
    tracksData.forEach((track, idx) => {
        const fileName = getTrackFile(track);
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = cleanSongName(fileName);
        opt.title = fileName;
        trackSelect.appendChild(opt);
    });
}

function selectTrack(idx) {
    const track = tracksData[idx];
    if (!track) return;
    const fileName = getTrackFile(track);
    const baseName = getTrackBase(track);
    player.src = AUDIO_BASE_DIR + encodeURIComponent(fileName);
    player.volume = Number(bgmVol.value) / 100;
    player.load();
    trackTitle.textContent = cleanSongName(fileName);
    document.getElementById("vocal-tag").textContent = cleanSongName(fileName);
    const emoData = songEmotionsData[baseName] || { attribute: "elegant", emotion: "neutral" };
    loadPortraitSprite(emoData.attribute || "elegant", emoData.emotion || "neutral");
    resetRunStats();
    updateHUD();
}

function getDensityNotes(track, density) {
    const fileName = getTrackFile(track);
    const noteSet = track.notes && track.notes[fileName] && track.notes[fileName][density];
    if (Array.isArray(noteSet) && noteSet.length) {
        return noteSet;
    }
    const beatSet = track.beats && track.beats[fileName] || [];
    const stride = density === "3" ? 1 : density === "2" ? 2 : 3;
    const attrs = ["brave", "elegant", "mystic"];
    return beatSet
        .filter((_, idx) => idx % stride === 0)
        .map((time, idx) => ({ time, attribute: attrs[idx % attrs.length] }));
}

function resetRunStats() {
    score = 0;
    combo = 0;
    maxCombo = 0;
    perfects = 0;
    greats = 0;
    goods = 0;
    misses = 0;
    lateHits = [];
    gameTime = 0;
    notesLayer.innerHTML = "";
    lastJudge.textContent = "READY";
    timingMarker.style.opacity = 0;
    setMeter(0, "#94a3b8");
}

function updateHUD() {
    scoreValEl.textContent = score;
    comboValEl.textContent = combo;
    timeValEl.textContent = Math.max(0, gameTime).toFixed(2);
    const judged = perfects + greats + goods + misses;
    const weighted = perfects + greats * 0.72 + goods * 0.42;
    accValEl.textContent = judged ? `${Math.round((weighted / judged) * 100)}%` : "--";
}

bgmVol.addEventListener("input", () => {
    bgmVolVal.textContent = `${bgmVol.value}%`;
    player.volume = Number(bgmVol.value) / 100;
});

seVol.addEventListener("input", () => {
    seVolVal.textContent = `${seVol.value}%`;
});

speedInput.addEventListener("input", () => {
    noteSpeed = Number(speedInput.value);
    speedVal.textContent = `${noteSpeed} px/s`;
});

offsetInput.addEventListener("input", () => {
    const value = Number(offsetInput.value);
    offsetVal.textContent = `${value > 0 ? "+" : ""}${value} ms`;
});

trackSelect.addEventListener("change", () => selectTrack(Number(trackSelect.value)));

densitySelect.addEventListener("change", () => {
    if (!isPlaying) {
        resetRunStats();
        updateHUD();
    }
});

playBtn.addEventListener("click", () => {
    isPlaying ? stopGame() : startGame();
});

calibrateBtn.addEventListener("click", () => {
    offsetInput.value = 0;
    offsetVal.textContent = "0 ms";
    lastJudge.textContent = "SYNC READY";
    setMeter(2, "#38bdf8");
});

function startGame() {
    const track = tracksData[Number(trackSelect.value)];
    if (!track) return;
    cancelAnimationFrame(loopId);
    resetRunStats();
    const notes = getDensityNotes(track, densitySelect.value);
    currentNotes = notes.map((note, idx) => ({
        id: idx,
        time: Number(note.time),
        attribute: ATTR[note.attribute] ? note.attribute : "elegant",
        hit: false,
        missed: false,
        dom: null
    })).sort((a, b) => a.time - b.time);
    isPlaying = true;
    isPaused = false;
    isCountingDown = true;
    isApproaching = false;
    countdownStart = performance.now();
    player.pause();
    player.currentTime = 0;
    player.muted = true;
    player.play().catch(() => {});
    activeState = "BGM";
    selectedRow = 0;
    selectedCol = 0;
    playBtn.textContent = "STOP";
    pauseModal.classList.remove("active");
    resultsModal.classList.remove("active");
    countdownOverlay.classList.add("active");
    countdownOverlay.classList.remove("approach");
    loopId = requestAnimationFrame(updateGameLoop);
}

function stopGame() {
    isPlaying = false;
    isPaused = false;
    isCountingDown = false;
    isApproaching = false;
    cancelAnimationFrame(loopId);
    player.pause();
    player.muted = false;
    player.volume = Number(bgmVol.value) / 100;
    notesLayer.innerHTML = "";
    countdownOverlay.classList.remove("active");
    countdownOverlay.classList.remove("approach");
    pauseModal.classList.remove("active");
    resultsModal.classList.remove("active");
    playBtn.textContent = "PLAY";
    activeState = "BGM";
    updateHUD();
}

function pauseGame() {
    if (!isPlaying || isPaused || isCountingDown || isApproaching) return;
    isPaused = true;
    player.pause();
    document.getElementById("pause-score").textContent = score;
    document.getElementById("pause-combo").textContent = combo;
    pauseModal.classList.add("active");
}

function resumeGame() {
    if (!isPlaying || !isPaused) return;
    isPaused = false;
    pauseModal.classList.remove("active");
    songStartPerformance = performance.now() - gameTime * 1000;
    player.play().catch(() => {});
    loopId = requestAnimationFrame(updateGameLoop);
}

document.getElementById("resume-btn").addEventListener("click", resumeGame);
document.getElementById("restart-btn").addEventListener("click", () => { stopGame(); startGame(); });
document.getElementById("exit-btn").addEventListener("click", stopGame);
document.getElementById("res-retry-btn").addEventListener("click", () => { resultsModal.classList.remove("active"); startGame(); });
document.getElementById("res-close-btn").addEventListener("click", () => resultsModal.classList.remove("active"));
document.getElementById("res-stop-btn").addEventListener("click", stopGame);

function getAdjustedGameTime() {
    return gameTime - Number(offsetInput.value) / 1000;
}

function laneY(attr) {
    return laneContainer.clientHeight * ATTR[attr].y;
}

function flashButton(attr) {
    const btn = document.querySelector(`.input-btn.${attr}`);
    if (!btn) return;
    btn.classList.add("active");
    setTimeout(() => btn.classList.remove("active"), 90);
}

function showHitText(text, color, y) {
    const el = document.createElement("div");
    el.className = "hit-text";
    el.textContent = text;
    el.style.color = color;
    el.style.top = `${y}px`;
    laneContainer.appendChild(el);
    setTimeout(() => el.remove(), 560);
}

function burstAt(x, y, color) {
    const ring = document.createElement("div");
    ring.className = "hit-ring";
    ring.style.left = `${x}px`;
    ring.style.top = `${y}px`;
    ring.style.color = color;
    laneContainer.appendChild(ring);
    setTimeout(() => ring.remove(), 380);

    for (let i = 0; i < 16; i++) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.color = color;
        const angle = Math.PI * 2 * (i / 16) + Math.random() * 0.22;
        const dist = 30 + Math.random() * 74;
        spark.style.setProperty("--tx", `${Math.cos(angle) * dist}px`);
        spark.style.setProperty("--ty", `${Math.sin(angle) * dist}px`);
        laneContainer.appendChild(spark);
        setTimeout(() => spark.remove(), 500);
    }
}

function setMeter(level, color) {
    lastJudge.style.color = color;
    meterBars.style.color = color;
    [...meterBars.children].forEach((bar, idx) => {
        bar.classList.toggle("lit", idx < level);
    });
}

function showTiming(diff, windowSec, color) {
    const px = Math.max(-80, Math.min(80, (diff / windowSec) * 80));
    timingMarker.style.opacity = 1;
    timingMarker.style.background = color;
    timingMarker.style.boxShadow = `0 0 16px ${color}`;
    timingMarker.style.transform = `translateX(${px}px)`;
    clearTimeout(showTiming.timer);
    showTiming.timer = setTimeout(() => { timingMarker.style.opacity = 0; }, 520);
}

function judgeInput(attribute) {
    if (!isPlaying || isPaused || isCountingDown || gameTime < 0) return;
    flashButton(attribute);

    const now = getAdjustedGameTime();
    const windowSec = Number(windowSelect.value) / 1000;
    let closest = null;
    let closestDiff = Infinity;

    for (const note of currentNotes) {
        if (note.hit || note.missed || note.attribute !== attribute) continue;
        const abs = Math.abs(note.time - now);
        if (abs <= windowSec && abs < closestDiff) {
            closest = note;
            closestDiff = abs;
        }
    }

    if (!closest) {
        lastJudge.textContent = "EMPTY";
        setMeter(1, "#64748b");
        return;
    }

    closest.hit = true;
    if (closest.dom) closest.dom.remove();
    playSE();

    const ratio = closestDiff / windowSec;
    let text = "GOOD";
    let points = 25;
    let color = "#38bdf8";
    let level = 2;
    if (ratio <= 0.28) {
        text = "PERFECT";
        points = 100;
        color = "#fbbf24";
        level = 4;
        perfects++;
    } else if (ratio <= 0.62) {
        text = "GREAT";
        points = 60;
        color = "#34d399";
        level = 3;
        greats++;
    } else {
        goods++;
    }

    score += points + Math.min(combo, 80);
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    comboValEl.classList.remove("bump");
    void comboValEl.offsetWidth;
    comboValEl.classList.add("bump");
    const x = laneContainer.clientWidth * JUDGMENT_X_RATIO;
    const y = laneY(attribute);
    showHitText(text, color, y);
    burstAt(x, y, color);
    showTiming(closest.time - now, windowSec, color);
    lastJudge.textContent = `${text} ${Math.round((closest.time - now) * 1000)}ms`;
    setMeter(level, color);
    updateHUD();
}

function missNote(note) {
    note.missed = true;
    combo = 0;
    misses++;
    if (note.dom) note.dom.remove();
    const y = laneY(note.attribute);
    showHitText("MISS", "#f87171", y);
    lastJudge.textContent = "MISS";
    setMeter(1, "#f87171");
    updateHUD();
}

document.querySelectorAll(".input-btn").forEach((btn) => {
    btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (inputModeSelect.value === "touch") flashButton(btn.dataset.attr);
    });
    btn.addEventListener("pointerup", (e) => {
        e.preventDefault();
        if (inputModeSelect.value === "touch") judgeInput(btn.dataset.attr);
    });
    btn.addEventListener("contextmenu", (e) => e.preventDefault());
});

let mouseLeftDown = false;
let mouseRightDown = false;
let mouseChordMystic = false;

function isMouseInputBlocked(target) {
    return Boolean(target.closest("#settings-ui, .modal-overlay"));
}

document.addEventListener("mousedown", (e) => {
    if (inputModeSelect.value !== "mouse" || isMouseInputBlocked(e.target)) return;
    if (e.button === 0) mouseLeftDown = true;
    if (e.button === 2) mouseRightDown = true;
    if (mouseLeftDown && mouseRightDown) mouseChordMystic = true;
    if (e.button === 1) {
        e.preventDefault();
        flashButton("mystic");
    }
});

document.addEventListener("mouseup", (e) => {
    if (inputModeSelect.value !== "mouse" || isMouseInputBlocked(e.target)) return;
    e.preventDefault();

    if (e.button === 1) {
        judgeInput("mystic");
        return;
    }

    if (mouseChordMystic && (e.button === 0 || e.button === 2)) {
        judgeInput("mystic");
        mouseChordMystic = false;
        mouseLeftDown = false;
        mouseRightDown = false;
        return;
    }

    if (e.button === 0) {
        mouseLeftDown = false;
        judgeInput("brave");
    }
    if (e.button === 2) {
        mouseRightDown = false;
        judgeInput("elegant");
    }
});

document.addEventListener("contextmenu", (e) => {
    if (inputModeSelect.value === "mouse" && !isMouseInputBlocked(e.target)) e.preventDefault();
});

document.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    if (e.key === "Escape") {
        if (!isPlaying) return;
        isPaused ? resumeGame() : pauseGame();
    }
});

function updateNotes() {
    const laneWidth = laneContainer.clientWidth;
    const judgmentX = laneWidth * JUDGMENT_X_RATIO;
    const spawnX = laneWidth * NOTE_SPAWN_X_RATIO;
    const travelTime = Math.max(0.1, (judgmentX - spawnX) / noteSpeed);
    for (const note of currentNotes) {
        if (note.hit || note.missed) continue;
        if (note.time <= gameTime + travelTime) {
            if (!note.dom) {
                const el = document.createElement("div");
                el.className = `note ${note.attribute}`;
                el.style.top = `${ATTR[note.attribute].y * 100}%`;
                el.innerHTML = `<span class="note-icon" style="background-position:${ICON_POS[note.attribute]}"></span>`;
                notesLayer.appendChild(el);
                note.dom = el;
            }
            const delta = note.time - gameTime;
            const x = judgmentX - delta * noteSpeed;
            note.dom.style.transform = `translateX(${x}px)`;
        }
        if (gameTime >= 0 && gameTime - note.time > LATE_MISS_MARGIN_SEC && !note.hit) {
            missNote(note);
        }
    }
}

function getTrackEndTime() {
    const lastNoteTime = currentNotes.length ? currentNotes[currentNotes.length - 1].time : 0;
    if (Number.isFinite(player.duration) && player.duration > 0) {
        return player.duration + RESULT_GRACE_SEC;
    }
    return lastNoteTime + RESULT_GRACE_SEC + 1.0;
}

function updateGameLoop(now) {
    if (!isPlaying || isPaused) return;

    if (isCountingDown) {
        const elapsed = (now - countdownStart) / 1000;
        const left = COUNTDOWN_SEC - elapsed;
        gameTime = -APPROACH_SEC;
        countdownOverlay.classList.add("active");
        countdownOverlay.classList.remove("approach");
        if (left > 2.0) countdownText.textContent = "3";
        else if (left > 1.0) countdownText.textContent = "2";
        else if (left > 0) countdownText.textContent = "1";
        else {
            isCountingDown = false;
            isApproaching = true;
            approachStart = performance.now();
            countdownText.textContent = "GET READY";
            countdownOverlay.classList.add("approach");
        }
    } else if (isApproaching) {
        const elapsed = (performance.now() - approachStart) / 1000;
        gameTime = elapsed - APPROACH_SEC;
        countdownOverlay.classList.add("active");
        countdownOverlay.classList.add("approach");
        countdownText.textContent = "GET READY";
        if (elapsed >= APPROACH_SEC) {
            isApproaching = false;
            countdownOverlay.classList.remove("approach");
            countdownOverlay.classList.remove("active");
            countdownText.textContent = "";
            songStartPerformance = performance.now();
            player.currentTime = 0;
            player.muted = false;
            player.volume = Number(bgmVol.value) / 100;
            if (player.paused) player.play().catch(() => {});
        }
    } else {
        const virtualTime = (performance.now() - songStartPerformance) / 1000;
        gameTime = player.paused ? virtualTime : player.currentTime;
    }

    if (!isCountingDown) updateNotes();
    updateHUD();

    if (player.ended || gameTime >= getTrackEndTime()) {
        setTimeout(() => { if (isPlaying) displayResults(); }, 650);
        return;
    }
    loopId = requestAnimationFrame(updateGameLoop);
}

function displayResults() {
    isPlaying = false;
    isPaused = false;
    player.pause();
    playBtn.textContent = "PLAY";
    const total = perfects + greats + goods + misses;
    const max = Math.max(1, total * 100);
    const ratio = score / max;
    let rank = "D";
    if (ratio >= 0.95) rank = "S";
    else if (ratio >= 0.82) rank = "A";
    else if (ratio >= 0.66) rank = "B";
    else if (ratio >= 0.48) rank = "C";
    const rankEl = document.getElementById("res-rank");
    rankEl.textContent = rank;
    rankEl.className = `result-rank rank-${rank}`;
    document.getElementById("res-perfect").textContent = perfects;
    document.getElementById("res-great").textContent = greats;
    document.getElementById("res-good").textContent = goods;
    document.getElementById("res-miss").textContent = misses;
    document.getElementById("res-maxcombo").textContent = maxCombo;
    document.getElementById("res-score").textContent = score;
    resultsModal.classList.add("active");
}

const spriteCanvas = document.getElementById("vocal-canvas");
const spriteCtx = spriteCanvas.getContext("2d");
let spriteImg = new Image();
let spriteAnimId = 0;
let spriteCols = 8;
let cellWidth = 0;
let cellHeight = 0;
let selectedRow = 0;
let selectedCol = 0;
let activeState = "BGM";
let lastStateCols = { BGM: 0, VOCAL: 0, CHORUS: 0, VOCAL_UP: 0 };
let lastReselectTime = 0;
let currentSpriteLoaded = false;
let isTransitioning = false;
let transSourceCell = { row: 0, col: 0 };
let transTargetCell = { row: 0, col: 0 };
let transStartTime = 0;

function loadPortraitSprite(attr, emotion) {
    cancelAnimationFrame(spriteAnimId);
    currentSpriteLoaded = false;
    spriteImg = new Image();
    spriteImg.onload = () => {
        currentSpriteLoaded = true;
        spriteCanvas.width = 360;
        spriteCanvas.height = 398;
        spriteCols = 8;
        cellWidth = spriteImg.width / 8;
        cellHeight = spriteImg.height / 4;
        selectedRow = 0;
        selectedCol = 0;
        activeState = "BGM";
        lastReselectTime = Date.now();
        drawSpriteFrame();
    };
    spriteImg.onerror = () => {
        if (attr !== "elegant" || emotion !== "neutral") loadPortraitSprite("elegant", "neutral");
    };
    spriteImg.src = `${SPRITE_BASE_DIR}vocal_sprite_${attr}_${emotion}_8x4.webp`;
}

function getRawStateAtTime(time) {
    if (!isPlaying || isPaused || isCountingDown) return "BGM";
    const track = tracksData[Number(trackSelect.value)];
    if (!track) return "BGM";
    const fileName = getTrackFile(track);
    const singing = track.singingIntervals && track.singingIntervals[fileName] || [];
    const excited = track.excitementSegments && track.excitementSegments[fileName] || [];
    const chorus = track.chorusCandidates && track.chorusCandidates[fileName] || [];
    const isSinging = singing.some((r) => time >= r[0] && time <= r[1]);
    const isExcited = excited.some((r) => time >= r[0] && time <= r[1]);
    const isChorus = chorus.some((r) => time >= r[0] && time <= r[1]);
    if (isSinging && isExcited) return "VOCAL_UP";
    if (isSinging) return "VOCAL";
    if (isChorus) return "CHORUS";
    return "BGM";
}

function triggerRandomCellForState(state) {
    const rowMap = { BGM: 0, VOCAL: 1, CHORUS: 2, VOCAL_UP: 3 };
    const row = rowMap[state] || 0;
    let col = Math.floor(Math.random() * spriteCols);
    const prev = lastStateCols[state];
    for (let i = 0; (col === selectedCol || col === prev) && i < 10; i++) {
        col = Math.floor(Math.random() * spriteCols);
    }
    lastStateCols[state] = col;
    startSpriteTransition(row, col);
    lastReselectTime = Date.now();
}

function startSpriteTransition(row, col) {
    if (row === selectedRow && col === selectedCol) return;
    transSourceCell = { row: selectedRow, col: selectedCol };
    transTargetCell = { row, col };
    transStartTime = Date.now();
    isTransitioning = true;
}

function drawSpriteCell(cell, alpha, xOffset = 0) {
    const cw = spriteCanvas.width;
    const ch = spriteCanvas.height;
    const sx = cell.col * cellWidth;
    const sy = cell.row * cellHeight;
    const aspect = cellWidth / cellHeight;
    let dw = cw * 1.16;
    let dh = ch * 1.16;
    if (cw / ch > aspect) dw = ch * aspect * 1.16;
    else dh = (cw / aspect) * 1.16;

    let scale = 1;
    let yOffset = 0;
    if (isPlaying && !isCountingDown && !player.paused) {
        const track = tracksData[Number(trackSelect.value)];
        const fileName = track ? getTrackFile(track) : "";
        const bpm = track && track.bpms && track.bpms[fileName] ? track.bpms[fileName] : 120;
        const beat = (gameTime / (60 / bpm)) % 1;
        const vocalBoost = activeState === "VOCAL" || activeState === "VOCAL_UP" ? 1 : 0.38;
        scale = 1 + 0.035 * vocalBoost * Math.exp(-beat * 8);
        yOffset = dh * 0.018 * vocalBoost * Math.sin(beat * Math.PI);
    }

    dw *= scale;
    dh *= scale;
    const dx = (cw - dw) / 2 + xOffset;
    const dy = (ch - dh) / 2 + yOffset;
    spriteCtx.save();
    spriteCtx.globalAlpha = alpha;
    spriteCtx.imageSmoothingEnabled = true;
    spriteCtx.drawImage(spriteImg, sx, sy, cellWidth, cellHeight, dx, dy, dw, dh);
    spriteCtx.restore();
}

function drawSpriteFrame() {
    if (!currentSpriteLoaded || !spriteImg.complete) return;
    const cw = spriteCanvas.width;
    const ch = spriteCanvas.height;
    spriteCtx.clearRect(0, 0, cw, ch);
    spriteCtx.fillStyle = "#f4ecd8";
    spriteCtx.fillRect(0, 0, cw, ch);

    const now = Date.now();
    const targetState = getRawStateAtTime(gameTime || 0);
    if (targetState !== activeState) {
        activeState = targetState;
        triggerRandomCellForState(activeState);
    }
    const track = tracksData[Number(trackSelect.value)];
    const fileName = track ? getTrackFile(track) : "";
    const bpm = track && track.bpms && track.bpms[fileName] ? track.bpms[fileName] : 120;
    const t = Math.min(1, Math.max(0, (bpm - 80) / 50));
    const intervalMs = (5 - 2 * t) * 1000;
    if (isPlaying && !isCountingDown && !isTransitioning && now - lastReselectTime >= intervalMs) {
        triggerRandomCellForState(activeState);
    }

    if (isTransitioning) {
        const progress = Math.min(1, (now - transStartTime) / 180);
        drawSpriteCell(transSourceCell, 1, -cw * progress);
        drawSpriteCell(transTargetCell, 1, cw - cw * progress);
        if (progress >= 1) {
            selectedRow = transTargetCell.row;
            selectedCol = transTargetCell.col;
            isTransitioning = false;
        }
    } else {
        drawSpriteCell({ row: selectedRow, col: selectedCol }, 1);
    }
    spriteAnimId = requestAnimationFrame(drawSpriteFrame);
}

const vizCanvas = document.getElementById("visualizer-canvas");
const vizCtx = vizCanvas.getContext("2d");
let beams = { brave: 0, elegant: 0, mystic: 0 };
let particles = [];

function resizeViz() {
    vizCanvas.width = vizCanvas.clientWidth;
    vizCanvas.height = vizCanvas.clientHeight;
}

window.addEventListener("resize", resizeViz);
resizeViz();

function drawVisualizer() {
    const w = vizCanvas.width;
    const h = vizCanvas.height;
    vizCtx.clearRect(0, 0, w, h);
    const grad = vizCtx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, "rgba(16,185,129,0.08)");
    grad.addColorStop(0.52, "rgba(168,85,247,0.13)");
    grad.addColorStop(1, "rgba(239,68,68,0.08)");
    vizCtx.fillStyle = grad;
    vizCtx.fillRect(0, 0, w, h);

    const singing = activeState === "VOCAL" || activeState === "VOCAL_UP";
    const amp = singing ? 82 : 34;
    const t = performance.now() * 0.001;
    ["#10b981", "#a855f7", "#ef4444"].forEach((color, idx) => {
        vizCtx.beginPath();
        vizCtx.strokeStyle = color;
        vizCtx.globalAlpha = singing ? 0.48 - idx * 0.08 : 0.18;
        vizCtx.lineWidth = singing ? 4 - idx * 0.7 : 2;
        for (let x = 0; x <= w; x += 6) {
            const y = h * 0.53
                + Math.sin(x * 0.007 + t * (2.2 + idx * 0.3)) * amp * Math.sin((x / w) * Math.PI)
                + Math.sin(x * 0.021 - t * 1.4 + idx) * amp * 0.22;
            if (x === 0) vizCtx.moveTo(x, y);
            else vizCtx.lineTo(x, y);
        }
        vizCtx.stroke();
    });
    vizCtx.globalAlpha = 1;

    for (const attr of Object.keys(beams)) {
        if (beams[attr] <= 0) continue;
        beams[attr] -= 0.045;
        const x = w * JUDGMENT_X_RATIO;
        const g = vizCtx.createLinearGradient(x, h, x, 0);
        g.addColorStop(0, `${hexToRgb(ATTR[attr].color, beams[attr] * 0.38)}`);
        g.addColorStop(1, `${hexToRgb(ATTR[attr].color, 0)}`);
        vizCtx.fillStyle = g;
        vizCtx.fillRect(x - 42, 0, 84, h);
    }

    if (singing && Math.random() < 0.11) {
        particles.push({
            x: w * (0.28 + Math.random() * 0.52),
            y: h * (0.32 + Math.random() * 0.32),
            vy: -0.9 - Math.random() * 1.7,
            alpha: 1,
            color: ["#10b981", "#a855f7", "#ef4444", "#fbbf24"][Math.floor(Math.random() * 4)]
        });
    }
    particles = particles.filter((p) => {
        p.y += p.vy;
        p.alpha -= 0.012;
        if (p.alpha <= 0) return false;
        vizCtx.globalAlpha = p.alpha;
        vizCtx.fillStyle = p.color;
        vizCtx.beginPath();
        vizCtx.arc(p.x, p.y, 3 + p.alpha * 5, 0, Math.PI * 2);
        vizCtx.fill();
        return true;
    });
    vizCtx.globalAlpha = 1;
    requestAnimationFrame(drawVisualizer);
}

function hexToRgb(hex, alpha) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
}

const originalJudgeInput = judgeInput;
judgeInput = function(attr) {
    beams[attr] = 1;
    originalJudgeInput(attr);
};

function loadTracksWhenReady() {
    if (typeof tracks !== "undefined" && Array.isArray(tracks) && tracks.length) {
        tracksData = tracks;
        songEmotionsData = typeof songEmotions !== "undefined" ? songEmotions : {};
        populateTracks();
        selectTrack(0);
    } else {
        trackTitle.textContent = "Waiting for rhythm_data.js...";
        setTimeout(loadTracksWhenReady, 100);
    }
}

loadTracksWhenReady();
drawVisualizer();
</script>
