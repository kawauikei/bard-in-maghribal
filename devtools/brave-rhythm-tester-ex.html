<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>勇猛ミニゲーム テスターEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --brave: #ef4444;
    --elegant: #06b6d4;
    --mystic: #a855f7;
    --gold: #fbbf24;
    --sky: #38bdf8;
    --ink: #07111f;
    --panel: rgba(8, 18, 32, 0.78);
    --panel-strong: rgba(10, 18, 32, 0.94);
    --line: rgba(255, 255, 255, 0.14);
    --muted: #9fb0c7;
}

* { box-sizing: border-box; }

html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}

body {
    position: relative;
    overflow: hidden;
    background: #030712;
    color: #f8fafc;
    font-family: Outfit, "Noto Sans JP", sans-serif;
    user-select: none;
}

#game-container {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    transform-origin: center center;
    --stage-bg: url("../assets/images/stil/N00/bg_normal_ancient_graveyard_morning1.webp");
    background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.25), rgba(3, 7, 18, 0.8)),
        radial-gradient(circle at 50% 12%, rgba(56, 189, 248, 0.16), transparent 33%),
        #07111f;
}

#stage {
    position: absolute;
    inset: 0 0 520px 0;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
}

#stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.12), rgba(3, 7, 18, 0.58) 72%, rgba(3, 7, 18, 0.82)),
        var(--stage-bg) center 42% / cover no-repeat;
    filter: saturate(0.94) contrast(1.04);
    transform: scale(1.02);
}

#stage::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 7;
    background:
        radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, 0.22), transparent 34%),
        linear-gradient(90deg, rgba(3, 7, 18, 0.58), transparent 18%, transparent 82%, rgba(3, 7, 18, 0.58));
}

#excalibur-canvas-container {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 520px;
    z-index: 5;
    pointer-events: none;
}

#visualizer-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 520px;
    z-index: 6;
    pointer-events: none;
    background: linear-gradient(to bottom right, rgba(168,85,247,0.08) 0%, rgba(6,182,212,0.13) 52%, rgba(239,68,68,0.08) 100%);
}

#hud {
    position: absolute;
    left: 24px;
    top: 24px;
    z-index: 20;
    display: grid;
    grid-template-columns: repeat(2, 120px);
    gap: 8px;
}

#condition-icons {
    position: absolute;
    left: 24px;
    top: 158px;
    z-index: 20;
    display: flex;
    gap: 8px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(5, 11, 22, 0.54);
    border: 1px solid rgba(255,255,255,0.11);
    backdrop-filter: blur(12px);
}

.condition-icon {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background-image: url("../assets/images/icon/icon_sheet_03_music_bonus_code.webp");
    background-size: 336px 336px;
    background-repeat: no-repeat;
    background-color: #f8fafc;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.24), 0 12px 24px rgba(0,0,0,0.28);
}

#stage-actions {
    position: absolute;
    right: 32px;
    top: 28px;
    z-index: 35;
    display: flex;
    gap: 10px;
}

#heat-panel {
    position: absolute;
    left: 24px;
    top: 222px;
    z-index: 20;
    width: 165px;
    padding: 9px 10px;
    border-radius: 8px;
    background: rgba(5, 11, 22, 0.58);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
}

.heat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

#heat-value {
    color: var(--gold);
    font-size: 14px;
}

.heat-track {
    height: 10px;
    margin-top: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    overflow: hidden;
}

#heat-fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, #06b6d4, #fbbf24);
    box-shadow: 0 0 18px rgba(251, 191, 36, 0.52);
    transition: width 160ms ease;
}

.hud-item, .meter-panel, #settings-ui {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px);
}

.hud-item {
    min-width: 0;
    padding: 9px 12px;
    border-radius: 8px;
}

.hud-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.hud-value {
    margin-top: 2px;
    color: #ffffff;
    font-size: 23px;
    font-weight: 900;
    line-height: 1;
}

.hud-value.accent { color: var(--sky); }
.hud-value.combo { color: var(--gold); }
.hud-value.bump { animation: comboBump 150ms ease-out; }

@keyframes comboBump {
    0% { transform: scale(1); }
    45% { transform: scale(1.18); }
    100% { transform: scale(1); }
}

#field {
    position: absolute;
    inset: 560px 0 0 0;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 34px;
    padding: 34px 42px 38px 42px;
    background:
        linear-gradient(90deg, rgba(3, 7, 18, 0.86), rgba(15, 23, 42, 0.54)),
        rgba(15, 23, 42, 0.2);
}

#vocal-portrait-container {
    align-self: end;
    height: 448px;
    overflow: hidden;
    position: relative;
    background: #f4ecd8;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 8px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.36);
}

#vocal-canvas {
    display: block;
    width: 100%;
    height: 398px;
    background: #f4ecd8;
}

.vocal-name {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    color: #f8fafc;
    background: linear-gradient(90deg, #111827, #1f2937);
    border-top: 1px solid rgba(15, 23, 42, 0.2);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.08em;
}

#lane-container {
    position: relative;
    min-width: 0;
    height: 448px;
}

.lane-path {
    position: absolute;
    left: 0;
    right: 112px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.01), rgba(255,255,255,0.12) 68%, rgba(255,255,255,0.03));
}

.lane-path.mystic { top: 17%; background-image: linear-gradient(90deg, rgba(168,85,247,0), rgba(168,85,247,0.24) 68%, rgba(168,85,247,0.04)); }
.lane-path.elegant { top: 50%; background-image: linear-gradient(90deg, rgba(6,182,212,0), rgba(6,182,212,0.24) 68%, rgba(6,182,212,0.04)); }
.lane-path.brave { top: 83%; background-image: linear-gradient(90deg, rgba(239,68,68,0), rgba(239,68,68,0.24) 68%, rgba(239,68,68,0.04)); }

#judgment-line {
    position: absolute;
    left: 74%;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.36), transparent);
    box-shadow: 0 0 12px rgba(255,255,255,0.24);
    z-index: 20;
}

.judgment-icon {
    position: absolute;
    width: 76px;
    height: 76px;
    margin-top: -38px;
    background-image: url("../assets/images/icon/icon_sheet_01_minigame_ui.webp");
    background-size: 800% 800%;
    opacity: 0.35;
    pointer-events: none;
    image-rendering: pixelated;
    z-index: 19;
    transition: transform 0.05s ease-out;
    transform-origin: center;
}
.judgment-icon.shrink {
    transform: scale(0.65);
}
.judgment-icon.mystic { top: 17%; background-position: 28.571% 42.857%; }
.judgment-icon.elegant { top: 50%; background-position: 14.285% 42.857%; }
.judgment-icon.brave { top: 83%; background-position: 0% 42.857%; }

.ripple-wave {
    position: absolute;
    width: 90px;
    height: 90px;
    margin-left: -45px;
    margin-top: -45px;
    border-radius: 50%;
    border: 3px solid;
    pointer-events: none;
    z-index: 25;
    animation: ripple-wave-anim 0.4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes ripple-wave-anim {
    0% { transform: scale(0.6); opacity: 0.8; border-width: 6px; }
    100% { transform: scale(1.6); opacity: 0; border-width: 1px; }
}

#notes-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.note {
    position: absolute;
    left: 0;
    width: 76px;
    height: 76px;
    margin-left: -38px;
    margin-top: -38px;
    z-index: 30;
    pointer-events: none;
    will-change: transform;
    backface-visibility: hidden;
}

.note-icon {
    display: block;
    width: 100%;
    height: 100%;
    background-image: url("../assets/images/icon/icon_sheet_01_minigame_ui.webp");
    background-size: 800% 800%;
    image-rendering: pixelated;
    filter: drop-shadow(0 12px 20px rgba(0,0,0,0.55));
}

#layout-diagnostic-hud {
    position: absolute;
    left: 24px;
    top: 280px;
    z-index: 100;
    background: rgba(4,9,20,0.92);
    border: 1px solid #10b981;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    color: #f8fafc;
    pointer-events: none;
    box-shadow: 0 12px 24px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 4px;
    line-height: 1.4;
}

#settings-ui {
    position: relative;
    width: 100%;
    display: grid;
    grid-template-columns: 1.25fr 0.74fr 0.78fr 1fr 1fr;
    gap: 12px;
    padding: 14px;
    border-radius: 8px;
}

.control-group {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.control-group label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

select {
    height: 38px;
    min-width: 0;
    padding: 0 10px;
    color: #f8fafc;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 6px;
    outline: none;
    font-size: 14px;
    font-weight: 700;
}

input[type="range"] {
    height: 38px;
    accent-color: var(--elegant);
}

.input-status {
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 10px;
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 6px;
    background: rgba(15, 23, 42, 0.92);
    color: #f8fafc;
    font-size: 14px;
    font-weight: 900;
}

.range-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.range-val {
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
}

.toolbar-actions {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    align-items: end;
}

.btn-primary, .btn-secondary, .bind-key-btn {
    height: 38px;
    border-radius: 6px;
    border: 1px solid transparent;
    color: white;
    cursor: pointer;
    font-weight: 900;
    letter-spacing: 0.08em;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
}

.btn-primary {
    background: linear-gradient(135deg, #7c3aed, #0284c7);
    box-shadow: 0 10px 24px rgba(56, 189, 248, 0.18);
}

.btn-secondary {
    background: rgba(255,255,255,0.08);
    border-color: var(--line);
}

.bind-key-btn {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
    font-size: 12px;
    letter-spacing: 0;
}

.stage-title {
    display: none;
    position: absolute;
    left: 48px;
    bottom: 32px;
    flex-direction: column;
    gap: 4px;
    z-index: 22;
    text-shadow: 0 16px 40px rgba(0,0,0,0.55);
}

.stage-title .kicker {
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
}

.stage-title h1 {
    margin: 0;
    font-size: 54px;
    line-height: 1;
    letter-spacing: 0;
}

.stage-title .track-name {
    max-width: 820px;
    color: #dbeafe;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.72;
}

.hit-text {
    position: absolute;
    z-index: 45;
    left: 74%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: #fff;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-shadow: 0 10px 24px rgba(0,0,0,0.8);
    animation: floatHit 520ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes floatHit {
    0% { opacity: 0; transform: translate(-50%, 14px) scale(0.72); }
    18% { opacity: 1; transform: translate(-50%, -8px) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -66px) scale(0.96); }
}

.hit-ring,
.spark {
    position: absolute;
    z-index: 42;
    pointer-events: none;
}

.hit-ring {
    width: 112px;
    height: 112px;
    margin-left: -56px;
    margin-top: -56px;
    border: 4px solid currentColor;
    border-radius: 50%;
    box-shadow: 0 0 20px currentColor;
    animation: burst 340ms ease-out forwards;
}

@keyframes burst {
    from { opacity: 1; transform: scale(0.52); }
    to { opacity: 0; transform: scale(1.7); }
}

.spark {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
    animation: spark 440ms ease-out forwards;
}

@keyframes spark {
    from { opacity: 1; transform: translate(0, 0) scale(1); }
    to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.15); }
}

.companion-particle {
    position: absolute;
    z-index: 46;
    pointer-events: none;
    left: var(--x);
    top: var(--y);
    color: var(--particle-color);
    font-size: var(--particle-size);
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 12px currentColor, 0 4px 10px rgba(0,0,0,0.55);
    animation: companionParticle var(--particle-duration) ease-out forwards;
    will-change: transform, opacity;
}

.companion-wave {
    position: absolute;
    z-index: 45;
    pointer-events: none;
    left: var(--x);
    top: var(--y);
    width: var(--wave-size);
    height: var(--wave-size);
    margin-left: calc(var(--wave-size) / -2);
    margin-top: calc(var(--wave-size) / -2);
    border: 2px solid var(--particle-color);
    border-radius: 50%;
    box-shadow: 0 0 18px var(--particle-color);
    opacity: 0.72;
    animation: companionWave 680ms ease-out forwards;
}

@keyframes companionParticle {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.66) rotate(0deg); }
    16% { opacity: 1; transform: translate(calc(-50% + var(--tx) * 0.18), calc(-50% + var(--ty) * 0.18)) scale(1.04) rotate(calc(var(--rot) * 0.25)); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.74) rotate(var(--rot)); }
}

@keyframes companionWave {
    from { opacity: 0.62; transform: scale(0.36); }
    to { opacity: 0; transform: scale(1.25); }
}

.bind-key-btn.waiting {
    color: #07111f;
    background: var(--gold);
}

.btn-primary:hover, .btn-secondary:hover:not(:disabled), .bind-key-btn:hover {
    transform: translateY(-1px);
}

#key-config-panel {
    position: relative;
    width: 100%;
    display: grid;
    gap: 8px;
    padding: 12px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px);
}

.key-config-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.bind-row {
    display: grid;
    grid-template-columns: 62px 1fr 118px;
    gap: 8px;
    align-items: center;
}

.bind-row strong {
    font-size: 13px;
    font-weight: 900;
}

.bind-row.brave strong { color: var(--brave); }
.bind-row.elegant strong { color: var(--elegant); }
.bind-row.mystic strong { color: var(--mystic); }

.bind-row select {
    height: 34px;
    font-size: 12px;
}

.meter-panel {
    position: absolute;
    right: 36px;
    bottom: 34px;
    z-index: 25;
    width: 320px;
    padding: 12px 14px;
    border-radius: 8px;
}

.meter-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
}

.meter-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.meter-value {
    font-size: 18px;
    font-weight: 900;
}

.meter-bars {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 5px;
    margin-top: 10px;
}

.meter-bars span {
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
}

.meter-bars .lit { background: currentColor; box-shadow: 0 0 12px currentColor; }

#countdown-overlay, .modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 80;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(3, 7, 18, 0.56);
    backdrop-filter: blur(10px);
}

#countdown-overlay.active, .modal-overlay.active {
    display: flex;
}

#countdown-text {
    color: #ffffff;
    font-size: 150px;
    font-weight: 900;
    text-shadow: 0 0 42px rgba(168, 85, 247, 0.82);
    animation: countPulse 1000ms ease-out infinite;
}

#countdown-overlay.approach {
    align-items: flex-start;
    padding-top: 432px;
    background: transparent;
    backdrop-filter: none;
    pointer-events: none;
}

#countdown-overlay.approach #countdown-text {
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 8px;
    background: rgba(8, 18, 32, 0.68);
    font-size: 44px;
    letter-spacing: 0.12em;
}

@keyframes countPulse {
    from { opacity: 0.45; transform: scale(0.86); }
    35% { opacity: 1; transform: scale(1); }
    to { opacity: 0.7; transform: scale(0.92); }
}

.modal-content {
    width: 620px;
    padding: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-strong);
    box-shadow: 0 34px 80px rgba(0,0,0,0.48);
    text-align: center;
}

.modal-title {
    margin: 0 0 18px;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.08em;
}

.pause-stats {
    color: #dbeafe;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
}

.modal-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 26px;
}

.result-rank {
    margin: 0 0 14px;
    font-size: 108px;
    line-height: 0.95;
    font-weight: 900;
    text-shadow: 0 0 34px currentColor;
}

.rank-S { color: var(--gold); }
.rank-A { color: var(--elegant); }
.rank-B { color: var(--sky); }
.rank-C { color: var(--mystic); }
.rank-D { color: #94a3b8; }

.result-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 18px;
}

.result-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    background: rgba(255,255,255,0.045);
    color: var(--muted);
    font-size: 15px;
    font-weight: 900;
}

.result-item span:last-child { color: #fff; }
.perfect span:last-child { color: var(--gold); }
.great span:last-child { color: #34d399; }
.good span:last-child { color: var(--sky); }
.miss span:last-child { color: #f87171; }

.touch-lane-hitarea {
    position: absolute;
    left: 0;
    right: 112px;
    height: 128px;
    transform: translateY(-50%);
    z-index: 32;
    border: 0;
    padding: 0;
    border-radius: 8px;
    background: transparent;
    color: currentColor;
    cursor: pointer;
    display: block;
    touch-action: manipulation;
}

.touch-lane-hitarea::after {
    content: "";
    position: absolute;
    inset: 10px 0;
    border-radius: 8px;
    background: linear-gradient(90deg, 
        rgba(255,255,255,0) 0%, 
        rgba(255,255,255,0.02) 50%, 
        rgba(255,255,255,0.06) 98%,
        currentColor 100%
    );
    border-top: 1px solid rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 80ms ease, border-color 80ms ease, box-shadow 80ms ease, transform 80ms ease;
}

.touch-lane-hitarea:active::after, .touch-lane-hitarea.active::after {
    background: linear-gradient(90deg, 
        rgba(255,255,255,0.02) 0%, 
        rgba(255,255,255,0.08) 50%, 
        rgba(255,255,255,0.15) 100%
    );
    box-shadow: inset 0 0 22px currentColor;
    transform: scaleY(0.96);
}

.touch-lane-hitarea.mystic { top: 17%; color: var(--mystic); }
.touch-lane-hitarea.elegant { top: 50%; color: var(--elegant); }
.touch-lane-hitarea.brave { top: 83%; color: var(--brave); }

/* --- 勇猛ロック演出 --- */
.touch-lane-hitarea.locked {
    background: linear-gradient(90deg, 
        rgba(248,113,113,0) 0%, 
        rgba(248,113,113,0.15) 50%, 
        rgba(248,113,113,0.3) 98%,
        #f87171 100%
    );
    border-top: 1px solid rgba(248,113,113,0.2);
    border-bottom: 1px solid rgba(248,113,113,0.2);
}

.touch-lane-hitarea.locked::before {
    content: "✕";
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    color: #f87171;
    font-size: 2rem;
    font-weight: bold;
    opacity: 0.8;
}

.input-btn {
    display: none;
}

.input-btn.mystic { top: 17%; color: var(--mystic); }
.input-btn.elegant { top: 50%; color: var(--elegant); }
.input-btn.brave { top: 83%; color: var(--brave); }
.input-btn.active, .input-btn:active {
    transform: translateY(-50%);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 30px currentColor, inset 0 0 18px currentColor;
}

body[data-input-mode="mouse"] .input-btn {
    pointer-events: none;
    opacity: 0.42;
}

body[data-input-mode="mouse"] .touch-lane-hitarea {
    pointer-events: none;
}

.btn-icon {
    position: relative;
    width: 64px;
    height: 64px;
    background-image: url("../assets/images/icon/icon_sheet_01_minigame_ui.webp");
    background-size: 800% 800%;
    image-rendering: pixelated;
    filter: drop-shadow(0 12px 14px rgba(0,0,0,0.45));
}
.input-btn.mystic .btn-icon { background-position: 28.571% 42.857%; }
.input-btn.elegant .btn-icon { background-position: 14.285% 42.857%; }
.input-btn.brave .btn-icon { background-position: 0% 42.857%; }

.timing-rail {
    position: absolute;
    left: 0;
    right: 112px;
    bottom: -2px;
    height: 24px;
}

.timing-rail::before {
    content: "";
    position: absolute;
    left: calc(74% - 80px);
    width: 160px;
    top: 11px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
}

.timing-marker {
    position: absolute;
    left: 74%;
    top: 4px;
    width: 16px;
    height: 16px;
    margin-left: -8px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 16px #ffffff;
    opacity: 0;
    transform: translateX(0);
    transition: opacity 160ms ease;
}

.config-stack {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
</style>
  <script type="module" crossorigin src="../build/devtools/brave-rhythm-tester-ex-FvmWpBIQ.js"></script>
  <link rel="modulepreload" crossorigin href="../build/excalibur-Dw4fWozV.js">
  <link rel="modulepreload" crossorigin href="../build/rhythm-test-particles-DTMHX1Lb.js">
</head>
<body>
<div id="game-container">
    <section id="stage">
        <!-- Canvas wrapper for Excalibur.js -->
        <div id="excalibur-canvas-container"></div>
        <canvas id="visualizer-canvas" width="1920" height="520"></canvas>

        <div id="hud">
            <div class="hud-item"><div class="hud-label">スコア</div><div class="hud-value accent" id="score-val">0</div></div>
            <div class="hud-item"><div class="hud-label">コンボ</div><div class="hud-value combo" id="combo-val">0</div></div>
            <div class="hud-item"><div class="hud-label">時間</div><div class="hud-value" id="time-val">0.00</div></div>
            <div class="hud-item"><div class="hud-label">精度</div><div class="hud-value" id="acc-val">--</div></div>
        </div>

        <div id="condition-icons" aria-label="演奏条件">
            <span class="condition-icon" data-track-icon="instrument" title="楽器"></span>
            <span class="condition-icon" data-track-icon="type" title="曲種"></span>
            <span class="condition-icon" data-track-icon="theme" title="テーマ"></span>
        </div>

        <div id="layout-diagnostic-hud">
            <div style="font-weight:bold; color:#fbbf24; border-bottom:1px solid rgba(255,255,255,0.15); padding-bottom:3px; margin-bottom:3px;">LAYOUT DIAGNOSTIC</div>
            <div id="diag-out-of-bounds">Out of Stage: 0px</div>
            <div id="diag-audience-overlap">Audience Overlap: 0px</div>
            <div id="diag-companion-overlap">Companion Overlap: 0px</div>
        </div>

        <div id="stage-actions">
            <button id="randomize-btn" class="btn-secondary" type="button">ランダム</button>
            <button id="play-btn" class="btn-primary">演奏開始</button>
            <button id="config-btn" class="btn-secondary" type="button">設定</button>
            <button id="fullscreen-btn" class="btn-secondary" type="button">全画面</button>
        </div>

        <div id="heat-panel">
            <div class="heat-head"><span>観客の熱気</span><span id="heat-value">0%</span></div>
            <div class="heat-track"><div id="heat-fill"></div></div>
        </div>

        <div class="stage-title">
            <div class="kicker">Elegant Performance</div>
            <h1>優美演奏会</h1>
            <div class="track-name" id="track-title">条件に合う楽曲を演奏中</div>
        </div>
    </section>

    <section id="field">
        <div id="vocal-portrait-container">
            <canvas id="vocal-canvas"></canvas>
            <div class="vocal-name" id="protagonist-title">駆け出し吟遊詩人</div>
        </div>

        <div id="lane-container">
            <div class="lane-path mystic"></div>
            <div class="lane-path elegant"></div>
            <div class="lane-path brave"></div>
            <div id="judgment-line"></div>
            <div class="judgment-icon mystic" style="left: calc(74% - 37px);"></div>
            <div class="judgment-icon elegant" style="left: calc(74% - 37px);"></div>
            <div class="judgment-icon brave" style="left: calc(74% - 37px);"></div>
            <div id="notes-layer"></div>
            <button class="touch-lane-hitarea mystic" data-attr="mystic" aria-label="神秘レーン"></button>
            <button class="touch-lane-hitarea elegant" data-attr="elegant" aria-label="優美レーン"></button>
            <button class="touch-lane-hitarea brave" data-attr="brave" aria-label="勇猛レーン"></button>
            <button class="input-btn mystic" data-attr="mystic" aria-label="神秘"><span class="btn-icon"></span></button>
            <button class="input-btn elegant" data-attr="elegant" aria-label="優美"><span class="btn-icon"></span></button>
            <button class="input-btn brave" data-attr="brave" aria-label="勇猛"><span class="btn-icon"></span></button>
            <div class="timing-rail"><span class="timing-marker" id="timing-marker"></span></div>
        </div>
    </section>

    <div class="meter-panel" id="judge-meter">
        <div class="meter-row">
            <div class="meter-title">直前の判定</div>
            <div class="meter-value" id="last-judge">準備完了</div>
        </div>
        <div class="meter-bars" id="meter-bars"><span></span><span></span><span></span><span></span></div>
    </div>

    <div id="countdown-overlay"><div id="countdown-text">3</div></div>

    <div id="pause-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">一時停止</h2>
            <div class="pause-stats">スコア <span id="pause-score">0</span> / コンボ <span id="pause-combo">0</span></div>
            <div class="modal-actions">
                <button id="resume-btn" class="btn-primary">再開する</button>
                <button id="restart-btn" class="btn-secondary">最初から</button>
                <button id="exit-btn" class="btn-secondary">終了する</button>
            </div>
        </div>
    </div>

    <div id="config-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">設定</h2>
            <div class="config-stack">
                <div id="settings-ui">
                    <div class="control-group">
                        <label for="track-select">デバッグ楽曲</label>
                        <select id="track-select"></select>
                    </div>
                    <div class="control-group">
                        <label for="density-select">ノーツ密度</label>
                        <select id="density-select">
                            <option value="1">控えめ</option>
                            <option value="2" selected>標準</option>
                            <option value="3">高密度</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="window-select">判定枠幅</label>
                        <select id="window-select">
                            <option value="250">広い (250ms)</option>
                            <option value="150" selected>標準 (150ms)</option>
                            <option value="80">狭い (80ms)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <div class="range-head"><label for="note-speed-input">スピード</label><span class="range-val" id="speed-val">180 px/s</span></div>
                        <input type="range" id="note-speed-input" min="180" max="620" value="180" step="20">
                    </div>
                    <div class="control-group">
                        <div class="range-head"><label for="offset">判定調節</label><span class="range-val" id="offset-val">0 ms</span></div>
                        <input type="range" id="offset" min="-250" max="250" value="0" step="5">
                    </div>
                    <div class="control-group">
                        <label for="input-mode-select">操作端末</label>
                        <div class="input-status" id="input-mode-status"><strong>PC</strong><span>自動検出</span></div>
                        <select id="input-mode-select" hidden>
                            <option value="mouse" selected>PC</option>
                            <option value="touch">Touch</option>
                        </select>
                    </div>
                    <div class="control-group pc-only-control">
                        <label for="key-timing-select">キー判定方式</label>
                        <select id="key-timing-select">
                            <option value="down">押し下げ時</option>
                            <option value="up">離し時</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <div class="range-head"><label for="bgm-vol">BGM音量</label><span class="range-val" id="bgm-vol-val">80%</span></div>
                        <input type="range" id="bgm-vol" min="0" max="100" value="80">
                    </div>
                    <div class="control-group">
                        <div class="range-head"><label for="se-vol">打鍵音量</label><span class="range-val" id="se-vol-val">OFF</span></div>
                        <input type="range" id="se-vol" min="0" max="100" value="0" disabled>
                    </div>
                    <div class="control-group">
                        <label for="companion-count-select">伴奏者人数</label>
                        <select id="companion-count-select">
                            <option value="0">0人</option>
                            <option value="1">1人</option>
                            <option value="2">2人</option>
                            <option value="3" selected>3人 (標準)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="audience-count-select">観客人数</label>
                        <select id="audience-count-select">
                            <option value="0">0人 (なし)</option>
                            <option value="4">4人 (少ない)</option>
                            <option value="8">8人 (軽量)</option>
                            <option value="12">12人 (標準)</option>
                            <option value="20">20人 (多い)</option>
                            <option value="30">30人 (最大)</option>
                            <option value="50" selected>50人 (カオス)</option>
                        </select>
                    </div>
                    <div class="toolbar-actions">
                        <button id="calibrate-btn" class="btn-secondary" type="button">設定リセット</button>
                        <button id="config-close-btn" class="btn-primary" type="button">閉じる</button>
                    </div>
                </div>

                <div id="key-config-panel">
                    <div class="key-config-title">PC キー割り当て設定</div>
                    <div class="bind-row brave" data-bind-row="brave">
                        <strong>勇猛</strong>
                        <button class="bind-key-btn" data-key-bind="brave" type="button">D</button>
                        <select class="mouse-bind-select" data-mouse-bind="brave">
                            <option value="none">マウス無効</option>
                            <option value="0">左クリック</option>
                            <option value="1">ホイールクリック</option>
                            <option value="2">右クリック</option>
                        </select>
                    </div>
                    <div class="bind-row elegant" data-bind-row="elegant">
                        <strong>優美</strong>
                        <button class="bind-key-btn" data-key-bind="elegant" type="button">F</button>
                        <select class="mouse-bind-select" data-mouse-bind="elegant">
                            <option value="none">マウス無効</option>
                            <option value="0">左クリック</option>
                            <option value="1">ホイールクリック</option>
                            <option value="2">右クリック</option>
                        </select>
                    </div>
                    <div class="bind-row mystic" data-bind-row="mystic">
                        <strong>神秘</strong>
                        <button class="bind-key-btn" data-key-bind="mystic" type="button">J</button>
                        <select class="mouse-bind-select" data-mouse-bind="mystic">
                            <option value="none">マウス無効</option>
                            <option value="0">左クリック</option>
                            <option value="1">ホイールクリック</option>
                            <option value="2">右クリック</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="results-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">演奏終了</h2>
            <div id="res-rank" class="result-rank rank-S">S</div>
            <div class="result-grid">
                <div class="result-item perfect"><span>パーフェクト</span><span id="res-perfect">0</span></div>
                <div class="result-item great"><span>グレート</span><span id="res-great">0</span></div>
                <div class="result-item good"><span>グッド</span><span id="res-good">0</span></div>
                <div class="result-item miss"><span>ミス</span><span id="res-miss">0</span></div>
                <div class="result-item"><span>最大コンボ数</span><span id="res-maxcombo">0</span></div>
                <div class="result-item"><span>最終スコア</span><span id="res-score">0</span></div>
            </div>
            <div class="modal-actions">
                <button id="res-retry-btn" class="btn-primary">再挑戦</button>
                <button id="res-close-btn" class="btn-secondary">閉じる</button>
                <button id="res-stop-btn" class="btn-secondary">停止</button>
            </div>
        </div>
    </div>
</div>

<audio id="bgm-player" preload="auto"></audio>
<script src="./rhythm_data.js"></script>
</body>
</html>
