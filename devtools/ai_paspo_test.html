<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>生成AIパスポート 全範囲テスト</title>
<style>
:root{--bg:#edf5f6;--panel:#fff;--ink:#18353a;--muted:#627a7f;--main:#087f86;--main2:#075e64;--line:#cadde0;--ok:#167849;--ng:#b13d3d}
*{box-sizing:border-box} body{margin:0;font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:linear-gradient(135deg,#e8f3f4,#f9fbfb);color:var(--ink)}
header{background:linear-gradient(105deg,#054b52,#0a8e95);color:#fff;padding:20px 24px;box-shadow:0 3px 12px #0002}
header h1{margin:0 0 6px;font-size:clamp(21px,3vw,31px)} header p{margin:0;opacity:.92}
main{max-width:1040px;margin:22px auto;padding:0 15px 60px} .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:21px;box-shadow:0 8px 24px #173f4612;margin-bottom:17px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:13px} label{display:block;font-weight:700;margin-bottom:6px}
select,button{font:inherit} select{width:100%;padding:11px;border:1px solid #abc5c9;border-radius:10px;background:#fff}
button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer} .primary{background:var(--main);color:#fff} .primary:hover{background:var(--main2)} .secondary{background:#e3eef0;color:var(--ink)} .danger{background:#f7e5e5;color:#8c2c2c}
.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:17px} .hidden{display:none!important}
.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.badge{display:inline-block;padding:5px 9px;border-radius:99px;background:#e0f1f2;color:#075e64;font-size:13px;font-weight:700}
.progress-wrap{height:10px;background:#dce9eb;border-radius:99px;overflow:hidden} .progress{height:100%;background:var(--main);transition:.25s}
.question{font-size:clamp(19px,2.5vw,24px);line-height:1.55;white-space:pre-line;margin:18px 0}
.choice{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;background:#fff;border:2px solid #c7d9dc;padding:13px 14px;margin:9px 0;border-radius:12px;font-weight:600;line-height:1.5}
.choice:hover{border-color:var(--main);background:#f4fbfb} .choice.selected{border-color:var(--main);background:#e4f5f6} .choice.correct{border-color:var(--ok);background:#e8f6ee;color:#105e3c} .choice.wrong{border-color:var(--ng);background:#faeaea;color:#922d2d}
.letter{flex:0 0 29px;height:29px;border-radius:50%;background:#dfecee;display:grid;place-items:center} .feedback{margin-top:17px;border-left:5px solid var(--main);background:#f2f8f9;padding:15px;border-radius:9px;line-height:1.7} .feedback.ok{border-color:var(--ok)} .feedback.ng{border-color:var(--ng)}
.small{font-size:13px;color:var(--muted)} .result-score{font-size:50px;font-weight:800;color:var(--main);text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:17px 0} .stat{background:#f2f8f8;border-radius:12px;padding:14px;text-align:center} .stat strong{display:block;font-size:23px}
.review-item{border-top:1px solid var(--line);padding:15px 0} .review-item:first-child{border-top:0} .oktext{color:var(--ok);font-weight:700} .ngtext{color:var(--ng);font-weight:700}
details{margin-top:15px} summary{cursor:pointer;font-weight:700} footer{text-align:center;color:var(--muted);font-size:12px;line-height:1.7;margin-top:22px}
@media(max-width:600px){.card{padding:15px}.actions button{flex:1}.question{font-size:20px}}
</style></head>
<body>
<header><h1>生成AIパスポート 全範囲テスト</h1><p>公式テキスト V4.8 対応／全 390 問・単一HTML・オフライン動作</p></header>
<main>
<section id="setup" class="card">
<h2>出題設定</h2>
<div class="grid">
<div><label>問題数</label><select id="count"><option>10</option><option>20</option><option selected>30</option><option>50</option><option>100</option><option value="390">全390問</option></select></div>
<div><label>章</label><select id="chapter"><option value="all">全章</option></select></div>
<div><label>節</label><select id="section"><option value="all">章内すべて</option></select></div>
<div><label>出題順</label><select id="order"><option value="random">ランダム</option><option value="fixed">テキスト順</option><option value="weak">苦手問題を優先</option></select></div>
</div>
<div class="actions"><button class="primary" id="startBtn">テスト開始</button><button class="secondary" id="wrongOnlyBtn">過去の誤答だけ</button><button class="danger" id="resetBtn">学習履歴を削除</button></div>
<p id="historySummary" class="small"></p>
<details><summary>収録範囲</summary><div id="coverage" class="small"></div></details>
</section>

<section id="quiz" class="card hidden">
<div class="topline"><div><span class="badge" id="chapterBadge"></span> <span class="badge" id="sectionBadge"></span> <span class="badge" id="difficultyBadge"></span></div><strong id="counter"></strong></div>
<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="question" id="question"></div><div id="choices"></div><div id="feedback" class="feedback hidden"></div>
<div class="actions"><button class="primary" id="answerBtn" disabled>回答する</button><button class="primary hidden" id="nextBtn">次の問題</button><button class="secondary" id="quitBtn">中断</button></div>
</section>

<section id="result" class="card hidden"><h2>結果</h2><div class="result-score" id="scoreText"></div>
<div class="stats"><div class="stat"><strong id="correctStat"></strong>正解</div><div class="stat"><strong id="wrongStat"></strong>不正解</div><div class="stat"><strong id="rateStat"></strong>正答率</div></div>
<div id="chapterStats"></div><div class="actions"><button class="primary" id="retryWrongBtn">今回の誤答を復習</button><button class="secondary" id="reviewBtn">回答一覧</button><button class="secondary" id="homeBtn">設定に戻る</button></div></section>

<section id="review" class="card hidden"><h2>回答一覧</h2><div id="reviewList"></div><div class="actions"><button class="secondary" id="backResultBtn">結果へ戻る</button></div></section>
<footer>問題文と解説は参考書の内容を学習問題向けに要約・再構成しています。法令・製品情報は変化するため、実務では最新の公式情報も確認してください。<br>学習履歴はブラウザのローカルストレージに保存されます。</footer>
</main>

const chapterNames={"1": "第1章 AI（人工知能）", "2": "第2章 生成AI", "3": "第3章 現在の生成AIの動向", "4": "第4章 情報リテラシー・法律・AI社会原則", "5": "第5章 プロンプト制作と実例"};
const sectionNames={"1-1": "AIの定義", "1-2": "AIに知能をもたらす仕組み", "1-3": "AIの種類", "1-4": "AIの歴史", "1-5": "シンギュラリティ", "2-1": "生成AIの誕生まで", "2-2": "ChatGPT", "2-3": "その他の主要生成AI", "3-1": "生成AIができることと主なサービス", "3-2": "ディープフェイク", "3-3": "RAG", "3-4": "AIエージェント", "4-1": "インターネットリテラシー", "4-2": "セキュリティとプライバシー", "4-3": "個人情報保護", "4-4": "制作物に関わる権利・法律", "4-5": "理念・原則・ガイドライン", "4-6": "AI新法", "5-1": "LMとLLM", "5-2": "プロンプティングの基礎", "5-3": "プロンプティングの実践", "5-4": "ビジネス応用", "5-5": "不得意なこと"};
let quiz=[],index=0,selected=null,answers=[],answered=false;
const $=id=>document.getElementById(id), shuffle=a=>[...a].sort(()=>Math.random()-.5);
function history(){try{return JSON.parse(localStorage.getItem("gaiPassportFullHistory")||"{}")}catch{return {}}}
function saveHistory(q,ok){const h=history(),k=String(q.id);h[k]=h[k]||{seen:0,wrong:0};h[k].seen++;if(!ok)h[k].wrong++;localStorage.setItem("gaiPassportFullHistory",JSON.stringify(h));updateHistory()}
function updateHistory(){const v=Object.values(history()),seen=v.reduce((a,x)=>a+x.seen,0),wrong=v.reduce((a,x)=>a+x.wrong,0);$("historySummary").textContent=`収録 ${questions.length}問｜回答 ${seen}回｜誤答 ${wrong}回｜誤答履歴 ${v.filter(x=>x.wrong>0).length}問`}
function populate(){for(const [k,v] of Object.entries(chapterNames)){$("chapter").add(new Option(v,k))} updateSections();
$("coverage").innerHTML=Object.entries(chapterNames).map(([k,v])=>`${v}：${questions.filter(q=>q.ch==k).length}問`).join("<br>")}
function updateSections(){const ch=$("chapter").value;$("section").innerHTML='<option value="all">章内すべて</option>';if(ch==="all")return;
const keys=[...new Set(questions.filter(q=>q.ch==ch).map(q=>q.s))].sort((a,b)=>a-b);for(const s of keys){$("section").add(new Option(`Section ${s}：${sectionNames[`${ch}-${s}`]}`,s))}}
function show(id){["setup","quiz","result","review"].forEach(x=>$(x).classList.toggle("hidden",x!==id))}
function makeQuiz(mode="normal",override=null){let pool=override||questions.filter(q=>($("chapter").value==="all"||q.ch==$("chapter").value)&&($("section").value==="all"||q.s==$("section").value));
if(mode==="wrong"){const h=history();pool=questions.filter(q=>h[q.id]?.wrong>0);if(!pool.length){alert("誤答履歴がありません。");return}}
const order=$("order").value;if(order==="weak"){const h=history();pool=[...pool].sort((a,b)=>(h[b.id]?.wrong||0)-(h[a.id]?.wrong||0)||Math.random()-.5)}else if(order==="random"||mode==="wrong")pool=shuffle(pool);else pool=[...pool].sort((a,b)=>a.ch-b.ch||a.s-b.s||a.p-b.p||a.id-b.id);
const n=override?pool.length:Math.min(Number($("count").value),pool.length);if(!n){alert("指定範囲に問題がありません。");return}quiz=pool.slice(0,n);index=0;answers=[];show("quiz");render()}
function render(){const q=quiz[index];selected=null;answered=false;$("counter").textContent=`${index+1} / ${quiz.length}`;$("progress").style.width=`${index/quiz.length*100}%`;
$("chapterBadge").textContent=chapterNames[q.ch];$("sectionBadge").textContent=`Section ${q.s}：${sectionNames[`${q.ch}-${q.s}`]}`;$("difficultyBadge").textContent=q.d;$("question").textContent=q.q;$("choices").innerHTML="";
q.c.forEach((t,i)=>{const b=document.createElement("button");b.className="choice";b.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span>${t}</span>`;b.onclick=()=>selectChoice(i,b);$("choices").appendChild(b)});
$("feedback").className="feedback hidden";$("answerBtn").classList.remove("hidden");$("answerBtn").disabled=true;$("nextBtn").classList.add("hidden");$("nextBtn").textContent=index===quiz.length-1?"結果を見る":"次の問題"}
function selectChoice(i,b){if(answered)return;selected=i;document.querySelectorAll(".choice").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");$("answerBtn").disabled=false}
function answer(){if(selected===null||answered)return;answered=true;const q=quiz[index],ok=selected===q.a;document.querySelectorAll(".choice").forEach((b,i)=>{if(i===q.a)b.classList.add("correct");if(i===selected&&!ok)b.classList.add("wrong");b.disabled=true});
const fb=$("feedback");fb.className=`feedback ${ok?"ok":"ng"}`;fb.innerHTML=`<strong>${ok?"正解":"不正解"}</strong><br>${q.e}<div class="small">出典目安：${chapterNames[q.ch]} p.${q.p}</div>`;answers.push({q,selected,ok});saveHistory(q,ok);$("answerBtn").classList.add("hidden");$("nextBtn").classList.remove("hidden");$("progress").style.width=`${(index+1)/quiz.length*100}%`}
function next(){if(index<quiz.length-1){index++;render()}else finish()}
function finish(){show("result");const correct=answers.filter(x=>x.ok).length,rate=Math.round(correct/answers.length*100);$("scoreText").textContent=`${correct} / ${answers.length}`;$("correctStat").textContent=correct;$("wrongStat").textContent=answers.length-correct;$("rateStat").textContent=rate+"%";
$("chapterStats").innerHTML="<h3>章別成績</h3>"+Object.keys(chapterNames).map(ch=>{const a=answers.filter(x=>x.q.ch==ch);if(!a.length)return "";const c=a.filter(x=>x.ok).length;return `<div class="review-item"><strong>${chapterNames[ch]}</strong>：${c}/${a.length}（${Math.round(c/a.length*100)}%）</div>`}).join("");$("retryWrongBtn").disabled=!answers.some(x=>!x.ok)}
function review(){$("reviewList").innerHTML=answers.map((x,i)=>`<div class="review-item"><div class="${x.ok?"oktext":"ngtext"}">問${i+1}：${x.ok?"正解":"不正解"}</div><strong>${x.q.q.replace("\n"," ")}</strong><br><span class="small">あなたの回答：${String.fromCharCode(65+x.selected)}. ${x.q.c[x.selected]}</span><br><span class="small">正解：${String.fromCharCode(65+x.q.a)}. ${x.q.c[x.q.a]}</span><p>${x.q.e}</p></div>`).join("");show("review")}
$("chapter").onchange=updateSections;$("startBtn").onclick=()=>makeQuiz();$("wrongOnlyBtn").onclick=()=>makeQuiz("wrong");$("answerBtn").onclick=answer;$("nextBtn").onclick=next;$("quitBtn").onclick=()=>{if(confirm("テストを中断しますか？"))show("setup")};
$("homeBtn").onclick=()=>show("setup");$("reviewBtn").onclick=review;$("backResultBtn").onclick=()=>show("result");$("retryWrongBtn").onclick=()=>makeQuiz("normal",answers.filter(x=>!x.ok).map(x=>x.q));
$("resetBtn").onclick=()=>{if(confirm("学習履歴を削除しますか？")){localStorage.removeItem("gaiPassportFullHistory");updateHistory()}};
populate();updateHistory();
</script></body></html>
