<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>優美演奏テスター Ex (Excalibur)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
    --brave: #ef4444;
    --elegant: #06b6d4;
    --mystic: #a855f7;
    --gold: #fbbf24;
    --sky: #38bdf8;
    --ink: #07111f;
    --panel: rgba(8, 18, 32, 0.78);
    --panel-strong: rgba(10, 18, 32, 0.94);
    --line: rgba(255, 255, 255, 0.14);
    --muted: #9fb0c7;
}

* { box-sizing: border-box; }

html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}

body {
    position: relative;
    overflow: hidden;
    background: #030712;
    color: #f8fafc;
    font-family: Outfit, "Noto Sans JP", sans-serif;
    user-select: none;
}

#game-container {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    transform-origin: center center;
    --stage-bg: url("../assets/images/stil/N00/bg_normal_ancient_graveyard_morning1.webp");
    background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.25), rgba(3, 7, 18, 0.8)),
        radial-gradient(circle at 50% 12%, rgba(56, 189, 248, 0.16), transparent 33%),
        #07111f;
}

#stage {
    position: absolute;
    inset: 0 0 520px 0;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
}

#stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.12), rgba(3, 7, 18, 0.58) 72%, rgba(3, 7, 18, 0.82)),
        var(--stage-bg) center 42% / cover no-repeat;
    filter: saturate(0.94) contrast(1.04);
    transform: scale(1.02);
}

#stage::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 7;
    background:
        radial-gradient(ellipse at 50% 0%, rgba(251, 191, 36, 0.22), transparent 34%),
        linear-gradient(90deg, rgba(3, 7, 18, 0.58), transparent 18%, transparent 82%, rgba(3, 7, 18, 0.58));
}

#excalibur-canvas-container {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 520px;
    z-index: 5;
}

#visualizer-canvas {
    position: absolute;
    left: 0;
    top: 0;
    width: 1920px;
    height: 520px;
    z-index: 6;
    pointer-events: none;
}

#hud {
    position: absolute;
    left: 24px;
    top: 24px;
    z-index: 20;
    display: grid;
    grid-template-columns: repeat(2, 120px);
    gap: 8px;
}

#condition-icons {
    position: absolute;
    left: 24px;
    top: 158px;
    z-index: 20;
    display: flex;
    gap: 8px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(5, 11, 22, 0.54);
    border: 1px solid rgba(255,255,255,0.11);
    backdrop-filter: blur(12px);
}

.condition-icon {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background-image: url("../assets/images/icon/icon_sheet_03_music_bonus_code.webp");
    background-size: 336px 336px;
    background-repeat: no-repeat;
    background-color: #f8fafc;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.24), 0 12px 24px rgba(0,0,0,0.28);
}

#stage-actions {
    position: absolute;
    right: 32px;
    top: 28px;
    z-index: 35;
    display: flex;
    gap: 10px;
}

#heat-panel {
    position: absolute;
    left: 24px;
    top: 222px;
    z-index: 20;
    width: 165px;
    padding: 9px 10px;
    border-radius: 8px;
    background: rgba(5, 11, 22, 0.58);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
}

.heat-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

#heat-value {
    color: var(--gold);
    font-size: 14px;
}

.heat-track {
    height: 10px;
    margin-top: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    overflow: hidden;
}

#heat-fill {
    height: 100%;
    width: 0%;
    border-radius: inherit;
    background: linear-gradient(90deg, #06b6d4, #fbbf24);
    box-shadow: 0 0 18px rgba(251, 191, 36, 0.52);
    transition: width 160ms ease;
}

.hud-item, .meter-panel, #settings-ui {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px);
}

.hud-item {
    min-width: 0;
    padding: 9px 12px;
    border-radius: 8px;
}

.hud-label {
    color: var(--muted);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.hud-value {
    margin-top: 2px;
    color: #ffffff;
    font-size: 23px;
    font-weight: 900;
    line-height: 1;
}

.hud-value.accent { color: var(--sky); }
.hud-value.combo { color: var(--gold); }
.hud-value.bump { animation: comboBump 150ms ease-out; }

@keyframes comboBump {
    0% { transform: scale(1); }
    45% { transform: scale(1.18); }
    100% { transform: scale(1); }
}

#field {
    position: absolute;
    inset: 560px 0 0 0;
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 34px;
    padding: 34px 42px 38px 42px;
    background:
        linear-gradient(90deg, rgba(3, 7, 18, 0.86), rgba(15, 23, 42, 0.54)),
        rgba(15, 23, 42, 0.2);
}

#vocal-portrait-container {
    align-self: end;
    height: 448px;
    overflow: hidden;
    position: relative;
    background: #f4ecd8;
    border: 1px solid rgba(255,255,255,0.24);
    border-radius: 8px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.36);
}

#vocal-canvas {
    display: block;
    width: 100%;
    height: 398px;
    background: #f4ecd8;
}

.vocal-name {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    color: #f8fafc;
    background: linear-gradient(90deg, #111827, #1f2937);
    border-top: 1px solid rgba(15, 23, 42, 0.2);
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.08em;
}

#lane-container {
    position: relative;
    min-width: 0;
    height: 448px;
}

.lane-path {
    position: absolute;
    left: 0;
    right: 112px;
    height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.01), rgba(255,255,255,0.12) 68%, rgba(255,255,255,0.03));
}

.lane-path.mystic { top: 17%; background-image: linear-gradient(90deg, rgba(168,85,247,0), rgba(168,85,247,0.24) 68%, rgba(168,85,247,0.04)); }
.lane-path.elegant { top: 50%; background-image: linear-gradient(90deg, rgba(6,182,212,0), rgba(6,182,212,0.24) 68%, rgba(6,182,212,0.04)); }
.lane-path.brave { top: 83%; background-image: linear-gradient(90deg, rgba(239,68,68,0), rgba(239,68,68,0.24) 68%, rgba(239,68,68,0.04)); }

#judgment-line {
    position: absolute;
    left: 74%;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.36), transparent);
    box-shadow: 0 0 12px rgba(255,255,255,0.24);
}

#notes-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
}

.note {
    position: absolute;
    left: 0;
    width: 76px;
    height: 76px;
    margin-left: -38px;
    margin-top: -38px;
    z-index: 30;
    pointer-events: none;
}

.note-icon {
    display: block;
    width: 100%;
    height: 100%;
    background-image: url("../assets/images/icon/icon_sheet_01_minigame_ui.webp");
    background-size: 800% 800%;
    image-rendering: pixelated;
    filter: drop-shadow(0 12px 20px rgba(0,0,0,0.55));
}

#layout-diagnostic-hud {
    position: absolute;
    left: 24px;
    top: 280px;
    z-index: 100;
    background: rgba(4,9,20,0.92);
    border: 1px solid #10b981;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    color: #f8fafc;
    pointer-events: none;
    box-shadow: 0 12px 24px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 4px;
    line-height: 1.4;
}

#settings-ui {
    position: relative;
    width: 100%;
    display: grid;
    grid-template-columns: 1.25fr 0.74fr 0.78fr 1fr 1fr;
    gap: 12px;
    padding: 14px;
    border-radius: 8px;
}

.control-group {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.control-group label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

select {
    height: 38px;
    min-width: 0;
    padding: 0 10px;
    color: #f8fafc;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 6px;
    outline: none;
    font-size: 14px;
    font-weight: 700;
}

input[type="range"] {
    height: 38px;
    accent-color: var(--elegant);
}

.input-status {
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 10px;
    border: 1px solid rgba(148, 163, 184, 0.28);
    border-radius: 6px;
    background: rgba(15, 23, 42, 0.92);
    color: #f8fafc;
    font-size: 14px;
    font-weight: 900;
}

.range-head {
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.range-val {
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
}

.toolbar-actions {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    align-items: end;
}

.btn-primary, .btn-secondary, .bind-key-btn {
    height: 38px;
    border-radius: 6px;
    border: 1px solid transparent;
    color: white;
    cursor: pointer;
    font-weight: 900;
    letter-spacing: 0.08em;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
}

.btn-primary {
    background: linear-gradient(135deg, #7c3aed, #0284c7);
    box-shadow: 0 10px 24px rgba(56, 189, 248, 0.18);
}

.btn-secondary {
    background: rgba(255,255,255,0.08);
    border-color: var(--line);
}

.bind-key-btn {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
    font-size: 12px;
    letter-spacing: 0;
}

.stage-title {
    display: none;
    position: absolute;
    left: 48px;
    bottom: 32px;
    flex-direction: column;
    gap: 4px;
    z-index: 22;
    text-shadow: 0 16px 40px rgba(0,0,0,0.55);
}

.stage-title .kicker {
    color: var(--muted);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
}

.stage-title h1 {
    margin: 0;
    font-size: 54px;
    line-height: 1;
    letter-spacing: 0;
}

.stage-title .track-name {
    max-width: 820px;
    color: #dbeafe;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.72;
}

.hit-text {
    position: absolute;
    z-index: 45;
    left: 74%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    color: #fff;
    font-size: 44px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-shadow: 0 10px 24px rgba(0,0,0,0.8);
    animation: floatHit 520ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes floatHit {
    0% { opacity: 0; transform: translate(-50%, 14px) scale(0.72); }
    18% { opacity: 1; transform: translate(-50%, -8px) scale(1.08); }
    100% { opacity: 0; transform: translate(-50%, -66px) scale(0.96); }
}

.hit-ring,
.spark {
    position: absolute;
    z-index: 42;
    pointer-events: none;
}

.hit-ring {
    width: 112px;
    height: 112px;
    margin-left: -56px;
    margin-top: -56px;
    border: 4px solid currentColor;
    border-radius: 50%;
    box-shadow: 0 0 20px currentColor;
    animation: burst 340ms ease-out forwards;
}

@keyframes burst {
    from { opacity: 1; transform: scale(0.52); }
    to { opacity: 0; transform: scale(1.7); }
}

.spark {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
    animation: spark 440ms ease-out forwards;
}

@keyframes spark {
    from { opacity: 1; transform: translate(0, 0) scale(1); }
    to { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.15); }
}

.companion-particle {
    position: absolute;
    z-index: 46;
    pointer-events: none;
    left: var(--x);
    top: var(--y);
    color: var(--particle-color);
    font-size: var(--particle-size);
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 12px currentColor, 0 4px 10px rgba(0,0,0,0.55);
    animation: companionParticle var(--particle-duration) ease-out forwards;
    will-change: transform, opacity;
}

.companion-wave {
    position: absolute;
    z-index: 45;
    pointer-events: none;
    left: var(--x);
    top: var(--y);
    width: var(--wave-size);
    height: var(--wave-size);
    margin-left: calc(var(--wave-size) / -2);
    margin-top: calc(var(--wave-size) / -2);
    border: 2px solid var(--particle-color);
    border-radius: 50%;
    box-shadow: 0 0 18px var(--particle-color);
    opacity: 0.72;
    animation: companionWave 680ms ease-out forwards;
}

@keyframes companionParticle {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.66) rotate(0deg); }
    16% { opacity: 1; transform: translate(calc(-50% + var(--tx) * 0.18), calc(-50% + var(--ty) * 0.18)) scale(1.04) rotate(calc(var(--rot) * 0.25)); }
    100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.74) rotate(var(--rot)); }
}

@keyframes companionWave {
    from { opacity: 0.62; transform: scale(0.36); }
    to { opacity: 0; transform: scale(1.25); }
}

.bind-key-btn.waiting {
    color: #07111f;
    background: var(--gold);
}

.btn-primary:hover, .btn-secondary:hover:not(:disabled), .bind-key-btn:hover {
    transform: translateY(-1px);
}

#key-config-panel {
    position: relative;
    width: 100%;
    display: grid;
    gap: 8px;
    padding: 12px;
    border-radius: 8px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: 0 20px 50px rgba(0,0,0,0.26);
    backdrop-filter: blur(18px);
}

.key-config-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.bind-row {
    display: grid;
    grid-template-columns: 62px 1fr 118px;
    gap: 8px;
    align-items: center;
}

.bind-row strong {
    font-size: 13px;
    font-weight: 900;
}

.bind-row.brave strong { color: var(--brave); }
.bind-row.elegant strong { color: var(--elegant); }
.bind-row.mystic strong { color: var(--mystic); }

.bind-row select {
    height: 34px;
    font-size: 12px;
}

.meter-panel {
    position: absolute;
    right: 36px;
    bottom: 34px;
    z-index: 25;
    width: 320px;
    padding: 12px 14px;
    border-radius: 8px;
}

.meter-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
}

.meter-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.12em;
}

.meter-value {
    font-size: 18px;
    font-weight: 900;
}

.meter-bars {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 5px;
    margin-top: 10px;
}

.meter-bars span {
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
}

.meter-bars .lit { background: currentColor; box-shadow: 0 0 12px currentColor; }

#countdown-overlay, .modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 80;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(3, 7, 18, 0.56);
    backdrop-filter: blur(10px);
}

#countdown-overlay.active, .modal-overlay.active {
    display: flex;
}

#countdown-text {
    color: #ffffff;
    font-size: 150px;
    font-weight: 900;
    text-shadow: 0 0 42px rgba(168, 85, 247, 0.82);
    animation: countPulse 1000ms ease-out infinite;
}

#countdown-overlay.approach {
    align-items: flex-start;
    padding-top: 432px;
    background: transparent;
    backdrop-filter: none;
    pointer-events: none;
}

#countdown-overlay.approach #countdown-text {
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 8px;
    background: rgba(8, 18, 32, 0.68);
    font-size: 44px;
    letter-spacing: 0.12em;
}

@keyframes countPulse {
    from { opacity: 0.45; transform: scale(0.86); }
    35% { opacity: 1; transform: scale(1); }
    to { opacity: 0.7; transform: scale(0.92); }
}

.modal-content {
    width: 620px;
    padding: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel-strong);
    box-shadow: 0 34px 80px rgba(0,0,0,0.48);
    text-align: center;
}

.modal-title {
    margin: 0 0 18px;
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.08em;
}

.pause-stats {
    color: #dbeafe;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
}

.modal-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 26px;
}

.result-rank {
    margin: 0 0 14px;
    font-size: 108px;
    line-height: 0.95;
    font-weight: 900;
    text-shadow: 0 0 34px currentColor;
}

.rank-S { color: var(--gold); }
.rank-A { color: var(--elegant); }
.rank-B { color: var(--sky); }
.rank-C { color: var(--mystic); }
.rank-D { color: #94a3b8; }

.result-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-top: 18px;
}

.result-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    background: rgba(255,255,255,0.045);
    color: var(--muted);
    font-size: 15px;
    font-weight: 900;
}

.result-item span:last-child { color: #fff; }
.perfect span:last-child { color: var(--gold); }
.great span:last-child { color: #34d399; }
.good span:last-child { color: var(--sky); }
.miss span:last-child { color: #f87171; }

.touch-lane-hitarea {
    position: absolute;
    left: 0;
    right: 112px;
    height: 128px;
    transform: translateY(-50%);
    z-index: 32;
    border: 0;
    padding: 0;
    border-radius: 8px;
    background: transparent;
    color: currentColor;
    cursor: pointer;
    display: none;
    touch-action: manipulation;
}

.touch-lane-hitarea::after {
    content: "";
    position: absolute;
    inset: 10px 0;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 80ms ease, border-color 80ms ease, box-shadow 80ms ease;
}

.touch-lane-hitarea:active::after {
    background: rgba(255,255,255,0.08);
    border-color: currentColor;
    box-shadow: inset 0 0 22px currentColor;
}

.touch-lane-hitarea.mystic { top: 17%; color: var(--mystic); }
.touch-lane-hitarea.elegant { top: 50%; color: var(--elegant); }
.touch-lane-hitarea.brave { top: 83%; color: var(--brave); }

body[data-input-mode="touch"] .touch-lane-hitarea {
    display: block;
}

.input-btn {
    position: absolute;
    left: calc(74% + 74px);
    width: 92px;
    height: 92px;
    transform: translateY(-50%);
    z-index: 35;
    display: grid;
    place-items: center;
    border-radius: 50%;
    border: 3px solid currentColor;
    background: rgba(8, 18, 32, 0.94);
    box-shadow: 0 18px 35px rgba(0,0,0,0.38), inset 0 0 24px rgba(255,255,255,0.04);
    cursor: pointer;
    transition: box-shadow 70ms ease, background 70ms ease;
}

const PORTRAIT_FRAME_OFFSET = {
    cols: 6, rows: 6, naturalSize: 2048, slice: 128, sliceL: 128, sliceT: 128, sliceB: 128,
    categoryCol: { brave: 0, common: 1, mystic: 2, elegant: 3, audience: 4, enemy: 5 }
};

function createPortraitFrameGroup(category, rank, baseW, baseH, frameWidth) {
    const f = PORTRAIT_FRAME_OFFSET;
    const col = f.categoryCol[category] ?? f.categoryCol.common;
    const row = Math.max(0, Math.min(f.rows - 1, Number(rank) || 0));
    const tw = f.naturalSize / f.cols;
    const th = f.naturalSize / f.rows;
    const sL = f.sliceL;
    const sT = f.sliceT;
    const sB = f.sliceB;
    const wL = frameWidth;
    const wT = frameWidth;
    const wB = frameWidth;
    const wVar = baseW - 2 * wL;
    const hVar = baseH - wT - wB;
    const sWVar = tw - 2 * sL;
    const sHVar = th - sT - sB;
    const cells = [
        { w: wL, h: wT, sx: 0, sy: 0, dx: 0, dy: 0, sw: sL, sh: sT },
        { w: wVar, h: wT, sx: sL, sy: 0, dx: wL, dy: 0, sw: sWVar, sh: sT },
        { w: wL, h: wT, sx: tw - sL, sy: 0, dx: baseW - wL, dy: 0, sw: sL, sh: sT },
        { w: wL, h: hVar, sx: 0, sy: sT, dx: 0, dy: wT, sw: sL, sh: sHVar },
        { w: wVar, h: hVar, sx: sL, sy: sT, dx: wL, dy: wT, sw: sWVar, sh: sHVar },
        { w: wL, h: hVar, sx: tw - sL, sy: sT, dx: baseW - wL, dy: wT, sw: sL, sh: sHVar },
        { w: wL, h: wB, sx: 0, sy: th - sB, dx: 0, dy: baseH - wB, sw: sL, sh: sB },
        { w: wVar, h: wB, sx: sL, sy: th - sB, dx: wL, dy: baseH - wB, sw: sWVar, sh: sB },
        { w: wL, h: wB, sx: tw - sL, sy: th - sB, dx: baseW - wL, dy: baseH - wB, sw: sL, sh: sB }
    ];
    return new ex.GraphicsGroup({
        members: cells.map((cell) => ({
            graphic: new ex.Sprite({
                image: resources.frame,
                sourceView: {
                    x: col * tw + cell.sx,
                    y: row * th + cell.sy,
                    width: cell.sw,
                    height: cell.sh
                },
                destSize: { width: cell.w, height: cell.h }
            }),
            offset: new ex.Vector(cell.dx, cell.dy)
        })),
        width: baseW,
        height: baseH
    });
}

// --- Excaliburアクター拡張 ---
class PortraitActor extends ex.Actor {
    constructor(x, y, isFront, rank, item) {
        super({
            pos: new ex.Vector(x, y),
            width: 128,
            height: 128,
            anchor: ex.Vector.Half,
            scale: new ex.Vector(isFront ? 1.0 : 0.88, isFront ? 1.0 : 0.88),
            z: isFront ? 23 : 21
        });
        this.isFront = isFront;
        this.rank = rank;
        this.item = item;
        this.bounceTimer = 0;
        this.baseScale = isFront ? 1.0 : 0.88;
        this.isCheering = false;
    }

    onInitialize(engine) {
        this.loadGraphics();
    }

    loadGraphics() {
        const [sheetName, index, label] = this.item;
        let src;
        if (sheetName.includes("region_A")) src = resources.audienceRegionA;
        else if (sheetName.includes("region_B")) src = resources.audienceRegionB;
        else src = resources.audienceRegionC;

        const cols = 5;
        const spriteW = src.width / cols;
        const spriteH = src.height / cols;
        const colIdx = index % cols;
        const rowIdx = Math.floor(index / cols);

        const sprite = new ex.Sprite({
            image: src,
            sourceView: {
                x: colIdx * spriteW,
                y: rowIdx * spriteH,
                width: spriteW,
                height: spriteH
            },
            destSize: { width: 120, height: 120 }
        });

        const frameGroup = createPortraitFrameGroup("audience", this.rank, 128, 128, 24);
        const group = new ex.GraphicsGroup({
            members: [
                { graphic: sprite, offset: new ex.Vector(4, 4) },
                { graphic: frameGroup, offset: new ex.Vector(0, 0) }
            ],
            width: 128,
            height: 128
        });

        this.graphics.use(group, { anchor: ex.Vector.Half });
    }

    cheer() {
        if (this.isCheering) return;
        this.isCheering = true;
        this.bounceTimer = 0;
    }

    onPostUpdate(engine, delta) {
        if (this.isCheering) {
            this.bounceTimer += delta / 1000;
            const duration = 0.52;
            if (this.bounceTimer >= duration) {
                this.isCheering = false;
                this.graphics.offset.y = 0;
                this.scale = new ex.Vector(this.baseScale, this.baseScale);
            } else {
                const progress = this.bounceTimer / duration;
                const jumpHeight = 14 * Math.sin(progress * Math.PI);
                const scaleBoost = 0.1 * Math.sin(progress * Math.PI);
                this.graphics.offset.y = -jumpHeight;
                this.scale = new ex.Vector(this.baseScale + scaleBoost, this.baseScale + scaleBoost);
            }
        }
    }
}

class CompanionActor extends ex.Actor {
    constructor(x, y, idx, item) {
        super({
            pos: new ex.Vector(x, y),
            width: 140,
            height: 140,
            anchor: ex.Vector.Half,
            z: 23
        });
        this.idx = idx;
        this.item = item;
        this.role = item[3] || "clap";
        this.baseX = x;
        this.swayTime = Math.random() * 5;
        this.assistTimer = 0;
        this.isAssisting = false;
        this.assistStrong = false;
    }

    onInitialize(engine) {
        this.loadGraphics();
    }

    loadGraphics() {
        const [sheetName, index, label, role] = this.item;
        let src;
        if (sheetName.includes("core_A")) src = resources.portraitCoreA;
        else if (sheetName.includes("candidates_A1")) src = resources.portraitCandA1;
        else if (sheetName.includes("candidates_A2")) src = resources.portraitCandA2;
        else if (sheetName.includes("candidates_B1")) src = resources.portraitCandB1;
        else src = resources.portraitCandB2;

        const cols = 4;
        const spriteW = src.width / cols;
        const spriteH = src.height / cols;
        const colIdx = index % cols;
        const rowIdx = Math.floor(index / cols);

        const sprite = new ex.Sprite({
            image: src,
            sourceView: {
                x: colIdx * spriteW,
                y: rowIdx * spriteH,
                width: spriteW,
                height: spriteH
            },
            destSize: { width: 132, height: 132 }
        });

        const frameGroup = createPortraitFrameGroup("elegant", this.idx, 140, 140, 24);
        const group = new ex.GraphicsGroup({
            members: [
                { graphic: sprite, offset: new ex.Vector(4, 4) },
                { graphic: frameGroup, offset: new ex.Vector(0, 0) }
            ],
            width: 140,
            height: 140
        });

        this.graphics.use(group, { anchor: ex.Vector.Half });
    }

    triggerAssist(strong = false) {
        this.isAssisting = true;
        this.assistStrong = strong;
        this.assistTimer = 0;
    }

    onPostUpdate(engine, delta) {
        this.swayTime += delta / 1000;
        
        let targetRot = 0.017 * Math.sin(this.swayTime * 2);
        let targetScale = 1.0;
        let offsetY = 0;

        if (this.isAssisting) {
            this.assistTimer += delta / 1000;
            const duration = this.assistStrong ? 0.98 : 0.62;
            if (this.assistTimer >= duration) {
                this.isAssisting = false;
                this.pos.x = this.baseX;
            } else {
                const progress = this.assistTimer / duration;
                const sinP = Math.sin(progress * Math.PI);
                if (this.role === "strings") {
                    this.pos.x = this.baseX + (this.assistStrong ? 20 : 10) * sinP;
                    targetRot = -0.07 * sinP;
                } else if (this.role === "dancer") {
                    targetRot = 0.25 * sinP;
                    targetScale = 1.0 + 0.08 * sinP;
                } else if (this.role === "mystic") {
                    offsetY = (this.assistStrong ? 20 : 12) * sinP;
                    targetScale = 1.0 + 0.1 * sinP;
                } else if (this.role === "salon") {
                    offsetY = (this.assistStrong ? 12 : 8) * sinP;
                    targetRot = -0.1 * sinP;
                } else {
                    targetScale = 1.0 + 0.12 * sinP;
                }
            }
        }

        this.rotation = targetRot;
        this.scale = new ex.Vector(targetScale, targetScale);
        this.graphics.offset.y = -offsetY;
    }
}

async function initExcalibur() {
    const container = document.getElementById("excalibur-canvas-container");
    
    engine = new ex.Engine({
        width: 1920,
        height: 520,
        backgroundColor: ex.Color.Transparent,
        suppressPlayButton: true,
        displayMode: ex.DisplayMode.Fixed
    });
    
    container.appendChild(engine.canvas);

    const resourceLoad = Promise.allSettled(Object.values(resources).map(resource => resource.load()));
    await engine.start();
    await resourceLoad;
    visualizerReady = true;

    updateStageBackground(STAGE_BACKGROUNDS[0].url);

    startVisualizerLoop();

    applySavedSettings();
    updateInputModeFromDevice();
    refreshBindingUI();
    syncControlLabels();
    updateCompanionVisibility();

    loadTracksWhenReady();
    window.setInterval(pulseCompanionAmbience, 2400);
}

// 描画エンジン内ビジュアライザー
let vizBeams = { brave: 0, elegant: 0, mystic: 0 };
let vizParticles = [];

function emitEngineParticles(x, y, color, type, char = "", strong = false) {
    if (type === "spark") {
        // リングエフェクト用の簡易描画をパーティクルで模擬するか、描画ループ内で直接円を描く
        vizParticles.push({
            x, y,
            type: "ring",
            color,
            alpha: 1,
            decay: 0.05,
            size: 10,
            targetSize: 80
        });

        for (let i = 0; i < 16; i++) {
            const angle = Math.PI * 2 * (i / 16) + Math.random() * 0.22;
            const dist = 30 + Math.random() * 74;
            const speed = dist / 0.5; 
            vizParticles.push({
                x, y,
                type: "text",
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                color,
                alpha: 1,
                decay: 0.03,
                size: 6 + Math.random() * 8,
                char: ["✦", "＊", "✧"][Math.floor(Math.random() * 3)],
                rot: Math.random() * 360,
                vrot: (Math.random() - 0.5) * 10
            });
        }
    } else if (type === "companion") {
        const count = strong ? 20 : 10;
        const baseAngle = -Math.PI / 2;
        const spread = 120 * Math.PI / 180;
        const lift = strong ? 200 : 120;
        for (let i = 0; i < count; i++) {
            const angle = baseAngle + (Math.random() - 0.5) * spread;
            const dist = lift * (0.48 + Math.random() * 0.7);
            const speed = dist / 0.8;
            vizParticles.push({
                x: x + (Math.random() - 0.5) * 34,
                y: y + (Math.random() - 0.5) * 22,
                type: "text",
                vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 40,
                vy: Math.sin(angle) * speed,
                color,
                alpha: 1,
                decay: strong ? 0.012 : 0.016,
                size: (strong ? 28 : 22) + Math.random() * 8,
                char,
                rot: Math.random() * 360,
                vrot: (Math.random() - 0.5) * 5
            });
        }
    }
}

function drawEngineVisualizer() {
    const ctx = visualizerCtx;
    if (!ctx) return;
    const w = visualizerCanvas.width;
    const h = visualizerCanvas.height;
    ctx.clearRect(0, 0, w, h);
    
    // 背景グラデーション
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, "rgba(168,85,247,0.08)");
    grad.addColorStop(0.52, "rgba(6,182,212,0.13)");
    grad.addColorStop(1, "rgba(239,68,68,0.08)");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    const singing = activeState === "VOCAL" || activeState === "VOCAL_UP";
    const amp = singing ? 82 : 34;
    const t = performance.now() * 0.001;

    // サイン波ライン
    ["#a855f7", "#06b6d4", "#ef4444"].forEach((color, idx) => {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.globalAlpha = singing ? 0.48 - idx * 0.08 : 0.18;
        ctx.lineWidth = singing ? 4 - idx * 0.7 : 2;
        for (let x = 0; x <= w; x += 6) {
            const y = h * 0.53
                + Math.sin(x * 0.007 + t * (2.2 + idx * 0.3)) * amp * Math.sin((x / w) * Math.PI)
                + Math.sin(x * 0.021 - t * 1.4 + idx) * amp * 0.22;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // オーラエフェクト
    for (const attr of Object.keys(vizBeams)) {
        if (vizBeams[attr] <= 0) continue;
        vizBeams[attr] -= 0.045;
        ctx.save();
        ctx.beginPath();
        const radiusX = 480;
        const radiusY = 130;
        ctx.translate(w / 2, h * 0.75);
        ctx.scale(1, radiusY / radiusX);
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radiusX);
        const color = ATTR[attr].color;
        const opacity = vizBeams[attr] * 0.22;
        grad.addColorStop(0, hexToRgb(color, opacity));
        grad.addColorStop(0.5, hexToRgb(color, opacity * 0.45));
        grad.addColorStop(1, hexToRgb(color, 0));
        ctx.fillStyle = grad;
        ctx.arc(0, 0, radiusX, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // 歌唱時の上昇バブルパーティクル
    if (singing && Math.random() < 0.11) {
        vizParticles.push({
            x: w * (0.28 + Math.random() * 0.52),
            y: h * (0.32 + Math.random() * 0.32),
            type: "bubble",
            vx: 0,
            vy: -0.9 - Math.random() * 1.7,
            alpha: 1,
            decay: 0.012,
            size: 3 + Math.random() * 5,
            color: ["#a855f7", "#06b6d4", "#ef4444", "#fbbf24"][Math.floor(Math.random() * 4)]
        });
    }

    // パーティクルの更新と描画
    vizParticles = vizParticles.filter(p => {
        p.alpha -= p.decay;
        if (p.alpha <= 0) return false;

        if (p.type === "ring") {
            const currentSize = p.size + (p.targetSize - p.size) * (1 - p.alpha);
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        } else if (p.type === "bubble") {
            p.y += p.vy;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else if (p.type === "text") {
            p.x += p.vx * 0.016;
            p.y += p.vy * 0.016;
            p.rot += p.vrot;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.font = `bold ${p.size}px Outfit, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillText(p.char, 0, 0);
            ctx.restore();
        }
        return true;
    });
}

// --- 数学的アークとレイアウト自動補正ロジック ---
function renderAudienceEx(picks) {
    audienceGroup.forEach(a => a.kill());
    audienceGroup = [];

    const total = picks.length;
    if (total === 0) return;

    const frontGroup = [];
    const backGroup = [];
    picks.forEach((item, idx) => {
        if (idx % 2 === 0) frontGroup.push({ item, originalIdx: idx });
        else backGroup.push({ item, originalIdx: idx });
    });

    const centerX = 960; 
    const angleRange = 3.0; 
    const startAngle = 3 * Math.PI / 2 - angleRange / 2;

    const placements = [];

    const calculateGroupPlacements = (group, isFront) => {
        const count = group.length;
        if (count === 0) return;

        const centerY = 280; 
        const radiusBaseX = isFront ? 700 : 820;
        const radiusBaseY = isFront ? 110 : 240;
        const staggerOffset = isFront ? 0 : (angleRange / Math.max(1, count)) * 0.5;

        group.forEach((entry, i) => {
            const { item, originalIdx } = entry;
            if (!item) return;

            let angle = 3 * Math.PI / 2;
            if (count > 1) {
                const ratio = i / (count - 1);
                angle = startAngle + ratio * angleRange + staggerOffset;
            } else if (count === 1) {
                angle = 3 * Math.PI / 2 + staggerOffset;
            }

            const angleJitter = (Math.random() - 0.5) * 0.008;
            const radiusJitter = (Math.random() - 0.5) * 8;
            const finalAngle = angle + angleJitter;
            const finalRadiusX = radiusBaseX + radiusJitter;
            const finalRadiusY = radiusBaseY + radiusJitter;

            const x = centerX + finalRadiusX * Math.cos(finalAngle);
            const yOffsetJitter = (Math.random() - 0.5) * (isFront ? 36 : 48);
            
            const angleFromCenter = Math.abs(finalAngle - 3 * Math.PI / 2);
            const edgeDrop = Math.pow(angleFromCenter / (angleRange / 2), 2) * 36;
            const y = centerY + finalRadiusY * Math.sin(finalAngle) + yOffsetJitter + edgeDrop;

            placements.push({
                item,
                originalIdx,
                isFront,
                x,
                y
            });
        });
    };

    calculateGroupPlacements(backGroup, false);
    calculateGroupPlacements(frontGroup, true);

    const compMinX = 960 - 246 - 64;
    const compMaxX = 960 + 246 + 64;
    const compMinY = 316 - 64;
    const compMaxY = 316 + 140 + 64;

    placements.forEach(p => {
        if (p.x > compMinX && p.x < compMaxX) {
            if (p.y > compMinY && p.y < compMaxY) {
                p.y = compMinY - 4; 
            }
        }
        keepAudienceAwayFromUi(p);
    });

    for (let iter = 0; iter < 10; iter++) {
        for (let i = 0; i < placements.length; i++) {
            for (let j = i + 1; j < placements.length; j++) {
                const p1 = placements[i];
                const p2 = placements[j];
                const dx = p2.x - p1.x;
                const dy = p2.y - p1.y;
                const dist = Math.hypot(dx, dy);
                const minDist = p1.isFront === p2.isFront ? 112 : 98;
                if (dist < minDist && dist > 0) {
                    const overlap = minDist - dist;
                    const forceX = (dx / dist) * overlap * 0.5;
                    const forceY = (dy / dist) * overlap * 0.5;
                    p1.x -= forceX;
                    p1.y -= forceY;
                    p2.x += forceX;
                    p2.y += forceY;
                }
            }
        }

        placements.forEach(p => {
            keepAudienceAwayFromUi(p);
            if (p.y > 462) p.y = 462;
            if (p.y < 64) p.y = 64;
            if (p.x < 64) p.x = 64;
            if (p.x > 1856) p.x = 1856;
        });
    }

    placements.forEach(p => {
        const actor = new PortraitActor(p.x, p.y, p.isFront, (p.originalIdx % 3) + 1, p.item);
        engine.add(actor);
        audienceGroup.push(actor);
    });

    window.setTimeout(checkLayoutIntegrityEx, 60);
}

// リアルタイムレイアウト診断ロジック (WebGL/Canvas座標ベースで算出)
function checkLayoutIntegrityEx() {
    const hud = document.getElementById("layout-diagnostic-hud");
    if (!hud) return;

    let outOfBoundsSum = 0;
    let audienceOverlapSum = 0;
    let companionOverlapSum = 0;

    const coords = audienceGroup.map(a => {
        const w = a.width * a.scale.x;
        const h = a.height * a.scale.y;
        return {
            left: a.pos.x - w / 2,
            right: a.pos.x + w / 2,
            top: a.pos.y - h / 2,
            bottom: a.pos.y + h / 2
        };
    });

    const compCoords = companionGroup.map(c => {
        const w = c.width * c.scale.x;
        const h = c.height * c.scale.y;
        return {
            left: c.pos.x - w / 2,
            right: c.pos.x + w / 2,
            top: c.pos.y - h / 2, 
            bottom: c.pos.y + h / 2
        };
    });

    coords.forEach(c => {
        if (c.bottom > 462) outOfBoundsSum += (c.bottom - 462);
        if (c.left < 64) outOfBoundsSum += (64 - c.left);
        if (c.right > 1856) outOfBoundsSum += (c.right - 1856);
    });

    for (let i = 0; i < coords.length; i++) {
        for (let j = i + 1; j < coords.length; j++) {
            const c1 = coords[i];
            const c2 = coords[j];
            const overlapX = Math.max(0, Math.min(c1.right, c2.right) - Math.max(c1.left, c2.left));
            const overlapY = Math.max(0, Math.min(c1.bottom, c2.bottom) - Math.max(c1.top, c2.top));
            audienceOverlapSum += (overlapX * overlapY);
        }
    }

    coords.forEach(c => {
        compCoords.forEach(comp => {
            const overlapX = Math.max(0, Math.min(c.right, comp.right) - Math.max(c.left, comp.left));
            const overlapY = Math.max(0, Math.min(c.bottom, comp.bottom) - Math.max(c.top, comp.top));
            companionOverlapSum += (overlapX * overlapY);
        });
    });

    document.getElementById("diag-out-of-bounds").textContent = `Out of Stage: ${Math.round(outOfBoundsSum)}px`;
    document.getElementById("diag-audience-overlap").textContent = `Audience Overlap: ${Math.round(audienceOverlapSum)}px`;
    document.getElementById("diag-companion-overlap").textContent = `Companion Overlap: ${Math.round(companionOverlapSum)}px`;

    const hasError = outOfBoundsSum > 0 || companionOverlapSum > 0;
    hud.style.borderColor = hasError ? "#ef4444" : "#10b981";
    hud.style.boxShadow = hasError ? "0 0 12px rgba(239, 68, 68, 0.4)" : "0 0 12px rgba(16, 185, 129, 0.4)";
}

}

function getTrackFile(track) {
    return track && track.generated && track.generated[0] ? track.generated[0] : `${track.id}.mp3`;
}

function getTrackBase(track) {

function getDensityNotes(track, density) {
    const fileName = getTrackFile(track);
    const noteSet = track.notes && track.notes[fileName] && track.notes[fileName][density];
    if (Array.isArray(noteSet) && noteSet.length) {
        return noteSet;
    }
    const beatSet = track.beats && track.beats[fileName] || [];
    const stride = density === "3" ? 1 : density === "2" ? 2 : 3;
    const attrs = ["brave", "elegant", "mystic"];
    return beatSet
        .filter((_, idx) => idx % stride === 0)
        .map((time, idx) => ({ time, attribute: attrs[idx % attrs.length] }));
}

function showTiming(diff, windowSec, color) {
    const px = Math.max(-80, Math.min(80, (diff / windowSec) * 80));
    timingMarker.style.opacity = 1;
    timingMarker.style.background = color;
    timingMarker.style.boxShadow = `0 0 16px ${color}`;
    timingMarker.style.transform = `translateX(${px}px)`;
    clearTimeout(showTiming.timer);
    showTiming.timer = setTimeout(() => { timingMarker.style.opacity = 0; }, 520);
}

function judgeInput(attribute) {
    if (!isPlaying || isPaused || isCountingDown || gameTime < 0) return;
    flashButton(attribute);
    vizBeams[attribute] = 1;

    const now = getAdjustedGameTime();
    const windowSec = Number(windowSelect.value) / 1000;
    let closest = null;
    let closestDiff = Infinity;

    for (const note of currentNotes) {
        if (note.hit || note.missed || note.attribute !== attribute) continue;
        const abs = Math.abs(note.time - now);
        if (abs <= windowSec && abs < closestDiff) {
            closest = note;
            closestDiff = abs;
        }
    }

    if (!closest) {
        lastJudge.textContent = "空振り";
        setMeter(1, "#64748b");
        return;
    }

    closest.hit = true;
    if (closest.dom) closest.dom.remove();

    const ratio = closestDiff / windowSec;
    let text = "グッド";
    let points = 25;
    let color = "#38bdf8";
    let level = 2;
    if (ratio <= 0.28) {
        text = "パーフェクト";
        points = 100;
        color = "#fbbf24";
        level = 4;
        perfects++;
        adjustAudienceHeat(5);
    } else if (ratio <= 0.62) {
        text = "グレート";
        points = 60;
        color = "#34d399";
        level = 3;
        greats++;
        adjustAudienceHeat(3);
    } else {
        goods++;
        adjustAudienceHeat(1);
    }

    score += points + Math.min(combo, 80);
    combo++;
    maxCombo = Math.max(maxCombo, combo);
    comboValEl.classList.remove("bump");
    void comboValEl.offsetWidth;
    comboValEl.classList.add("bump");

    const x = laneContainer.clientWidth * JUDGMENT_X_RATIO;
    const y = laneY(attribute);
    showHitText(text, color, y);
    burstAt(x, y, color);
    emitEngineParticles(x, y, color, "spark");
    triggerCompanionAssist(activeState === "VOCAL_UP" || text === "パーフェクト");
    showTiming(closest.time - now, windowSec, color);
    lastJudge.textContent = `${text} ${Math.round((closest.time - now) * 1000)}ms`;
    setMeter(level, color);
    updateHUD();
}

function missNote(note) {
    note.missed = true;
    combo = 0;
    misses++;
    adjustAudienceHeat(-8);
    if (note.dom) note.dom.remove();
    const y = laneY(note.attribute);
    showHitText("ミス", "#f87171", y);
    lastJudge.textContent = "ミス";
    setMeter(1, "#f87171");
    updateHUD();
}

// 伴奏者と観客の選出・描画
function randomizeStageCast() {
    const bg = STAGE_BACKGROUNDS[Math.floor(Math.random() * STAGE_BACKGROUNDS.length)];
    updateStageBackground(bg.url);

    const companionCount = Number(companionCountSelect.value);
    const companions = pickUnique(ELEGANT_COMPANION_POOL, companionCount);
    
    const audienceCount = Number(audienceCountSelect.value);
    renderAudienceEx(pickStageAudience(bg, audienceCount));
    updateCompanionsEx(companions);
}

function pickUnique(pool, count) {
    const source = [...pool];
    const picks = [];
    while (source.length && picks.length < count) {
        const idx = Math.floor(Math.random() * source.length);
        picks.push(source.splice(idx, 1)[0]);
    }
    return picks;
}

function audienceKey(item) { return `${item[0]}:${item[1]}`; }
function audienceRegion(item) {
    const [sheet, index] = item;
    const columns = 5; 
    const row = Math.floor(index / columns);
    return AUDIENCE_REGION_ROWS[sheet]?.[row] || "generic";
}

function keepAudienceAwayFromUi(p) {
    const half = p.isFront ? 64 : 56;
    const uiRects = [
        { left: 0, right: 220, top: 0, bottom: 335 }
    ];
    for (const rect of uiRects) {
        const overlapsX = p.x + half > rect.left && p.x - half < rect.right;
        const overlapsY = p.y + half > rect.top && p.y - half < rect.bottom;
        if (overlapsX && overlapsY) {
            p.x = rect.right + half + 10;
        }
    }
}

function pickStageAudience(stageMeta, count = 22) {
    const used = new Set();
    const region = stageMeta?.audienceRegion || "generic";
    const localPool = AUDIENCE_POOL.filter(item => audienceRegion(item) === region);
    const genericPool = AUDIENCE_POOL.filter(item => audienceRegion(item) === "generic");
    const otherPool = AUDIENCE_POOL.filter(item => audienceRegion(item) !== region && audienceRegion(item) !== "generic");

    const picks = [];
    const localLimit = Math.min(Math.ceil(count * 0.45), localPool.length);
    const localPicks = pickUnique(localPool, localLimit);
    picks.push(...localPicks);
    localPicks.forEach(item => used.add(audienceKey(item)));

    const remainingCount = count - picks.length;
    const filteredGeneric = genericPool.filter(item => !used.has(audienceKey(item)));
    const genericPicks = pickUnique(filteredGeneric, Math.min(remainingCount, filteredGeneric.length));
    picks.push(...genericPicks);
    genericPicks.forEach(item => used.add(audienceKey(item)));

    if (picks.length < count) {
        const nextRemaining = count - picks.length;
        const filteredOther = otherPool.filter(item => !used.has(audienceKey(item)));
        const otherPicks = pickUnique(filteredOther, Math.min(nextRemaining, filteredOther.length));
        picks.push(...otherPicks);
    }
    return picks;
}

// --- ボーカルポートレート (`#vocal-canvas`) 描画系 ---
const spriteCanvas = document.getElementById("vocal-canvas");
const spriteCtx = spriteCanvas.getContext("2d");
let spriteImg = new Image();
let spriteAnimId = 0;
let spriteCols = 8;
let cellWidth = 0;
let cellHeight = 0;
let selectedRow = 0;
let selectedCol = 0;
let activeState = "BGM";
let lastStateCols = { BGM: 0, VOCAL: 0, CHORUS: 0, VOCAL_UP: 0 };
let lastReselectTime = 0;
let currentSpriteLoaded = false;
let isTransitioning = false;
let transSourceCell = { row: 0, col: 0 };
let transTargetCell = { row: 0, col: 0 };
let transStartTime = 0;

function loadPortraitSprite(attr, emotion) {
    cancelAnimationFrame(spriteAnimId);
    currentSpriteLoaded = false;
    spriteImg = new Image();
    spriteImg.onload = () => {
        currentSpriteLoaded = true;
        spriteCanvas.width = 360;
        spriteCanvas.height = 398;
        spriteCols = 8;
        cellWidth = spriteImg.width / 8;
        cellHeight = spriteImg.height / 4;
        selectedRow = 0;
        selectedCol = 0;
        activeState = "BGM";
        lastReselectTime = Date.now();
        drawSpriteFrame();
    };
    spriteImg.onerror = () => {
        if (attr !== "elegant" || emotion !== "neutral") loadPortraitSprite("elegant", "neutral");
    };
    spriteImg.src = `${SPRITE_BASE_DIR}vocal_sprite_${attr}_${emotion}_8x4.webp`;
}

function getRawStateAtTime(time) {
    if (!isPlaying || isPaused || isCountingDown) return "BGM";
    const track = tracksData[Number(trackSelect.value)];
    if (!track) return "BGM";
    const fileName = getTrackFile(track);
    const singing = track.singingIntervals && track.singingIntervals[fileName] || [];
    const excited = track.excitementSegments && track.excitementSegments[fileName] || [];
    const chorus = track.chorusCandidates && track.chorusCandidates[fileName] || [];
    const isSinging = singing.some((r) => time >= r[0] && time <= r[1]);
    const isExcited = excited.some((r) => time >= r[0] && time <= r[1]);
    const isChorus = chorus.some((r) => time >= r[0] && time <= r[1]);
    if (isSinging && isExcited) return "VOCAL_UP";
    if (isSinging) return "VOCAL";
    if (isChorus) return "CHORUS";
    return "BGM";
}

function triggerRandomCellForState(state) {
    const rowMap = { BGM: 0, VOCAL: 1, CHORUS: 2, VOCAL_UP: 3 };
    const row = rowMap[state] || 0;
    let col = Math.floor(Math.random() * spriteCols);
    const prev = lastStateCols[state];
    for (let i = 0; (col === selectedCol || col === prev) && i < 10; i++) {
        col = Math.floor(Math.random() * spriteCols);
    }
    lastStateCols[state] = col;
    startSpriteTransition(row, col);
    lastReselectTime = Date.now();
}

function startSpriteTransition(row, col) {
    if (row === selectedRow && col === selectedCol) return;
    transSourceCell = { row: selectedRow, col: selectedCol };
    transTargetCell = { row, col };
    transStartTime = Date.now();
    isTransitioning = true;
}

function drawSpriteCell(cell, alpha, xOffset = 0) {
    const cw = spriteCanvas.width;
    const ch = spriteCanvas.height;
    const sx = cell.col * cellWidth;
    const sy = cell.row * cellHeight;
    const aspect = cellWidth / cellHeight;
    let dw = cw * 1.16;
    let dh = ch * 1.16;
    if (cw / ch > aspect) dw = ch * aspect * 1.16;
    else dh = (cw / aspect) * 1.16;

    let scale = 1;
    let yOffset = 0;
    if (isPlaying && !isCountingDown && !player.paused) {
        const track = tracksData[Number(trackSelect.value)];
        const fileName = track ? getTrackFile(track) : "";
        const bpm = track && track.bpms && track.bpms[fileName] ? track.bpms[fileName] : 120;
        const beat = (gameTime / (60 / bpm)) % 1;
        const vocalBoost = activeState === "VOCAL" || activeState === "VOCAL_UP" ? 1 : 0.38;
        scale = 1 + 0.035 * vocalBoost * Math.exp(-beat * 8);
        yOffset = dh * 0.018 * vocalBoost * Math.sin(beat * Math.PI);
    }

    dw *= scale;
    dh *= scale;
    const dx = (cw - dw) / 2 + xOffset;
    const dy = (ch - dh) / 2 + yOffset;
    spriteCtx.save();
    spriteCtx.globalAlpha = alpha;
    spriteCtx.imageSmoothingEnabled = true;
    spriteCtx.drawImage(spriteImg, sx, sy, cellWidth, cellHeight, dx, dy, dw, dh);
    spriteCtx.restore();
}

function drawSpriteFrame() {
    if (!currentSpriteLoaded || !spriteImg.complete) return;
    const cw = spriteCanvas.width;
    const ch = spriteCanvas.height;
    spriteCtx.clearRect(0, 0, cw, ch);
    spriteCtx.fillStyle = "#f4ecd8";
    spriteCtx.fillRect(0, 0, cw, ch);

    const now = Date.now();
    const targetState = getRawStateAtTime(gameTime || 0);
    if (targetState !== activeState) {
        activeState = targetState;
        triggerRandomCellForState(activeState);
    }
    const track = tracksData[Number(trackSelect.value)];
    const fileName = track ? getTrackFile(track) : "";
    const bpm = track && track.bpms && track.bpms[fileName] ? track.bpms[fileName] : 120;
    const t = Math.min(1, Math.max(0, (bpm - 80) / 50));
    const intervalMs = (5 - 2 * t) * 1000;
    if (isPlaying && !isCountingDown && !isTransitioning && now - lastReselectTime >= intervalMs) {
        triggerRandomCellForState(activeState);
    }

    if (isTransitioning) {
        const progress = Math.min(1, (now - transStartTime) / 180);
        drawSpriteCell(transSourceCell, 1, -cw * progress);
        drawSpriteCell(transTargetCell, 1, cw - cw * progress);
        if (progress >= 1) {
            selectedRow = transTargetCell.row;
            selectedCol = transTargetCell.col;
            isTransitioning = false;
        }
    } else {
        drawSpriteCell({ row: selectedRow, col: selectedCol }, 1);
    }
    spriteAnimId = requestAnimationFrame(drawSpriteFrame);
}

// 演奏終了判定用終了時間
function getTrackEndTime() {
    const lastNoteTime = currentNotes.length ? currentNotes[currentNotes.length - 1].time : 0;
    if (Number.isFinite(player.duration) && player.duration > 0) {
        return player.duration + RESULT_GRACE_SEC;
    }
    return lastNoteTime + RESULT_GRACE_SEC + 1.0;
}

// 一時停止・再開
function pauseGame() {
    if (!isPlaying || isPaused || isCountingDown || isApproaching) return;
    isPaused = true;
    player.pause();
    document.getElementById("pause-score").textContent = score;
    document.getElementById("pause-combo").textContent = combo;
    pauseModal.classList.add("active");
}

function resumeGame() {
    if (!isPlaying || !isPaused) return;
    isPaused = false;
    pauseModal.classList.remove("active");
    songStartPerformance = performance.now() - (gameTime * 1000);
    player.play().catch(() => {});
}

function restartGame() {
    pauseModal.classList.remove("active");
    startGame();
}

function exitGame() {
    pauseModal.classList.remove("active");
    stopGame();
}

// プレイ開始
playBtn.addEventListener("click", () => {
    if (isPlaying) {
        stopGame();
    } else {
        startGame();
    }
});

function startGame() {
    const track = tracksData[Number(trackSelect.value)];
    if (!track) return;
    resetRunStats();
    
    const notes = getDensityNotes(track, densitySelect.value);
    currentNotes = notes.map((note, idx) => ({
        id: idx,
        time: Number(note.time),
        attribute: ATTR[note.attribute] ? note.attribute : "elegant",
        hit: false,
        missed: false,
        dom: null
    })).sort((a, b) => a.time - b.time);
    
    isPlaying = true;
    isPaused = false;
    isCountingDown = true;
    isApproaching = false;
    countdownStart = performance.now();
    player.pause();
    player.currentTime = 0;
    player.muted = true;
    player.play().catch(() => {});
    activeState = "BGM";
    selectedRow = 0;
    selectedCol = 0;
    playBtn.textContent = "演奏停止";
    pauseModal.classList.remove("active");
    resultsModal.classList.remove("active");
    countdownOverlay.classList.add("active");
    countdownOverlay.classList.remove("approach");
    
    loopId = requestAnimationFrame(updateGameLoop);
}

function stopGame() {
    isPlaying = false;
    isPaused = false;
    isCountingDown = false;
    isApproaching = false;
    cancelAnimationFrame(loopId);
    player.pause();
    player.muted = false;
    player.volume = Number(bgmVol.value) / 100;
    document.getElementById("notes-layer").innerHTML = "";
    countdownOverlay.classList.remove("active", "approach");
    pauseModal.classList.remove("active");
    resultsModal.classList.remove("active");
    playBtn.textContent = "演奏開始";
    activeState = "BGM";
    updateHUD();
}

function updateNotes() {
    const laneWidth = laneContainer.clientWidth;
    const judgmentX = laneWidth * JUDGMENT_X_RATIO;
    const spawnX = laneWidth * NOTE_SPAWN_X_RATIO;
    const travelTime = Math.max(0.1, (judgmentX - spawnX) / noteSpeed);
    
    for (const note of currentNotes) {
        if (note.hit || note.missed) continue;
        if (note.time <= gameTime + travelTime) {
            if (!note.dom) {
                const el = document.createElement("div");
                el.className = `note ${note.attribute}`;
                el.style.top = `${ATTR[note.attribute].y * 100}%`;
                el.innerHTML = `<span class="note-icon" style="background-position:${ICON_POS[note.attribute]}"></span>`;
                document.getElementById("notes-layer").appendChild(el);
                note.dom = el;
            }
            const delta = note.time - gameTime;
            const x = judgmentX - delta * noteSpeed;
            note.dom.style.transform = `translateX(${x}px)`;
        }
        if (gameTime >= 0 && gameTime - note.time > LATE_MISS_MARGIN_SEC && !note.hit) {
            missNote(note);
        }
    }
}

function updateGameLoop(now) {
    if (!isPlaying || isPaused) return;
    
    if (isCountingDown) {
        const elapsed = (now - countdownStart) / 1000;
        const left = COUNTDOWN_SEC - elapsed;
        gameTime = -APPROACH_SEC;
        countdownOverlay.classList.add("active");
        countdownOverlay.classList.remove("approach");
        if (left > 2.0) countdownText.textContent = "3";
        else if (left > 1.0) countdownText.textContent = "2";
        else if (left > 0) countdownText.textContent = "1";
        else {
            isCountingDown = false;
            isApproaching = true;
            approachStart = performance.now();
            countdownText.textContent = "GET READY";
            countdownOverlay.classList.add("approach");
        }
    } else if (isApproaching) {
        const elapsed = (performance.now() - approachStart) / 1000;
        gameTime = elapsed - APPROACH_SEC;
        countdownOverlay.classList.add("active", "approach");
        countdownText.textContent = "GET READY";
        if (elapsed >= APPROACH_SEC) {
            isApproaching = false;
            countdownOverlay.classList.remove("approach", "active");
            countdownText.textContent = "";
            songStartPerformance = performance.now();
            player.currentTime = 0;
            player.muted = false;
            player.volume = Number(bgmVol.value) / 100;
            if (player.paused) player.play().catch(() => {});
        }
    } else {
        const virtualTime = (performance.now() - songStartPerformance) / 1000;
        gameTime = player.paused ? virtualTime : player.currentTime;
    }

    if (!isCountingDown) updateNotes();
    updateHUD();

    if (player.ended || gameTime >= getTrackEndTime()) {
        setTimeout(() => { if (isPlaying) displayResults(); }, 650);
        return;
    }
    loopId = requestAnimationFrame(updateGameLoop);
}

function displayResults() {
    isPlaying = false;
    isPaused = false;
    player.pause();
    playBtn.textContent = "演奏開始";
    cancelAnimationFrame(loopId);

    const total = perfects + greats + goods + misses;
    const max = Math.max(1, total * 100);
    const ratio = score / max;
    let rank = "D";
    if (ratio >= 0.95) rank = "S";
    else if (ratio >= 0.82) rank = "A";
    else if (ratio >= 0.66) rank = "B";
    else if (ratio >= 0.48) rank = "C";

    const rankEl = document.getElementById("res-rank");
    rankEl.textContent = rank;
    rankEl.className = `result-rank rank-${rank}`;

    document.getElementById("res-perfect").textContent = perfects;
    document.getElementById("res-great").textContent = greats;
    document.getElementById("res-good").textContent = goods;
    document.getElementById("res-miss").textContent = misses;
    document.getElementById("res-maxcombo").textContent = maxCombo;
    document.getElementById("res-score").textContent = score;

    resultsModal.classList.add("active");
}

function applyTrackIcons(track) {
    const rawId = String(track && track.id || "");
    const parts = rawId.split("_");
    let insCode = 201;
    let typeCode = 211;
    let themeCode = 221;
    let isSpecial = false;
    let specialRegion = 1;
    let specialAttr = "elegant";

    if (parts.length >= 4) {
        if (parts[1] === "special") {
            isSpecial = true;
            specialRegion = parseInt(parts[2], 10) || 1;
            specialAttr = parts[3] || "elegant";
        } else {
            insCode = parseInt(parts[1], 10) || insCode;
            typeCode = parseInt(parts[2], 10) || typeCode;
            themeCode = parseInt(parts[3], 10) || themeCode;
        }
    }

    const iconDefs = {
        instrument: { sheet: "icon_sheet_03_music_bonus_code.webp", index: 18, title: "楽器" },
        type: { sheet: "icon_sheet_03_music_bonus_code.webp", index: 30, title: "曲種" },
        theme: { sheet: "icon_sheet_03_music_bonus_code.webp", index: 43, title: "テーマ" }
    };

    if (isSpecial) {
        iconDefs.instrument.index = 4;
        iconDefs.type.sheet = "icon_sheet_02_card_event_code.webp";
        iconDefs.type.index = 16 + (specialRegion - 1);
        iconDefs.theme.sheet = "icon_sheet_01_minigame_ui.webp";
        iconDefs.theme.index = specialAttr === "mystic" ? 26 : specialAttr === "brave" ? 24 : 25;
    } else {
        const instrumentMap = { 101: 16, 102: 17, 201: 18, 202: 19, 301: 20, 302: 21, 401: 22, 402: 23, 501: 24, 502: 25, 601: 26, 602: 27 };
        const typeMap = { 111: 28, 112: 29, 211: 30, 212: 31, 311: 32, 312: 33, 411: 34, 412: 35, 511: 36, 512: 37, 611: 38, 612: 39 };
        const themeMap = {
            121: 40, 122: 41, 123: 42,
            221: 43, 222: 44, 223: 45,
            321: 46, 322: 47, 323: 48,
            421: 49, 422: 50, 423: 51,
            521: 52, 522: 53, 523: 54,
            621: 55, 622: 56, 623: 57
        };
        iconDefs.instrument.index = instrumentMap[insCode] ?? iconDefs.instrument.index;
        iconDefs.type.index = typeMap[typeCode] ?? iconDefs.type.index;
        iconDefs.theme.index = themeMap[themeCode] ?? iconDefs.theme.index;
    }

    function iconPosition(index) {
        const tile = 42;
        const col = index % 8;
        const row = Math.floor(index / 8);
        return `${-(col * tile)}px ${-(row * tile)}px`;
    }

    for (const [key, def] of Object.entries(iconDefs)) {
        const el = conditionIconEls[key];
        if (!el) continue;
        el.style.backgroundImage = `url("../assets/images/icon/${def.sheet}")`;
        el.style.backgroundPosition = iconPosition(def.index);
        el.title = def.title;
    }
}

function hexToRgb(hex, alpha) {
    const n = parseInt(hex.slice(1), 16);
    return `rgba(${(n >> 16) & 255}, ${(n >> 8) & 255}, ${n & 255}, ${alpha})`;
}

// --- キー割り当て・入力イベント設定 ---
function getAttributeForKey(code) {
    for (const attr of Object.keys(keyBindings)) {
        if (keyBindings[attr].key === code) return attr;
    }
    return "";
}

function getAttributeForMouse(btn) {
    for (const attr of Object.keys(keyBindings)) {
        if (keyBindings[attr].mouse === String(btn)) return attr;
    }
    return "";
}

function setKeyBinding(attr, code) {
    for (const k of Object.keys(keyBindings)) {
        if (k !== attr && keyBindings[k].key === code) keyBindings[k].key = ""; 
    }
    keyBindings[attr].key = code;
    waitingBindAttr = "";
    document.querySelectorAll(".bind-key-btn").forEach((btn) => btn.classList.remove("waiting"));
    if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
    saveSettings();
    refreshBindingUI();
}

function setMouseBinding(attr, buttonValue) {
    for (const k of Object.keys(keyBindings)) {
        if (k !== attr && keyBindings[k].mouse === buttonValue && buttonValue !== "none") {
            keyBindings[k].mouse = "none";
        }
    }
    keyBindings[attr].mouse = buttonValue;
    saveSettings();
    refreshBindingUI();
}

function isTouchDevice() {
    const mobileUA = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
    const compactTouch = navigator.maxTouchPoints > 0 &&
        window.matchMedia("(pointer: coarse)").matches &&
        Math.min(window.innerWidth, window.innerHeight) <= 820;
    return mobileUA || compactTouch;
}

function refreshBindingUI() {
    for (const attr of Object.keys(keyBindings)) {
        const keyBtn = document.querySelector(`[data-key-bind="${attr}"]`);
        const mouseSelect = document.querySelector(`[data-mouse-bind="${attr}"]`);
        if (keyBtn) {
            const code = keyBindings[attr].key;
            keyBtn.textContent = KEY_LABELS[code] || code.replace(/^Key/, "") || "未設定";
        }
        if (mouseSelect) mouseSelect.value = keyBindings[attr].mouse;
    }
}

function readSavedSettings() {
    try {
        return JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || "{}");
    } catch {
        return {};
    }
}

function normalizeBindings(raw) {
    const next = JSON.parse(JSON.stringify(DEFAULT_BINDINGS));
    for (const attr of Object.keys(next)) {
        if (!raw || typeof raw[attr] !== "object") continue;
        if (typeof raw[attr].key === "string" && raw[attr].key) next[attr].key = raw[attr].key;
        if (typeof raw[attr].mouse === "string") next[attr].mouse = raw[attr].mouse;
    }
    return next;
}

function applySavedSettings() {
    const settings = readSavedSettings();
    if (settings.density) densitySelect.value = settings.density;
    if (settings.window) windowSelect.value = settings.window;
    if (settings.speed) {
        speedInput.value = settings.speed;
        noteSpeed = Number(settings.speed);
    }
    if (settings.offset) offsetInput.value = settings.offset;
    if (settings.bgm) {
        bgmVol.value = settings.bgm;
        player.volume = Number(settings.bgm) / 100;
    }
    if (settings.companionCount !== undefined) companionCountSelect.value = settings.companionCount;
    if (settings.audienceCount !== undefined) audienceCountSelect.value = settings.audienceCount;
    keyJudgeTiming = settings.keyJudgeTiming === "up" ? "up" : "down";
    keyTimingSelect.value = keyJudgeTiming;
    keyBindings = normalizeBindings(settings.bindings);
}

function saveSettings() {
    const settings = {
        track: trackSelect.value,
        density: densitySelect.value,
        window: windowSelect.value,
        speed: speedInput.value,
        offset: offsetInput.value,
        bgm: bgmVol.value,
        keyJudgeTiming,
        bindings: keyBindings,
        companionCount: companionCountSelect.value,
        audienceCount: audienceCountSelect.value
    };
    localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings));
}

function updateCompanionVisibility() {
    // Excalibur版ではCompanionActorの追加・削除で制御しているため、この関数はUI状態確認のみ
}

function syncControlLabels() {
    noteSpeed = Number(speedInput.value);
    speedVal.textContent = `${noteSpeed} px/s`;
    const offsetValue = Number(offsetInput.value);
    offsetVal.textContent = `${offsetValue > 0 ? "+" : ""}${offsetValue} ms`;
    bgmVolVal.textContent = `${bgmVol.value}%`;
    seVolVal.textContent = seVol.value === "0" ? "OFF" : `${seVol.value}%`;
}

function resetToDefaultSettings() {
    keyBindings = JSON.parse(JSON.stringify(DEFAULT_BINDINGS));
    densitySelect.value = "2";
    windowSelect.value = "150";
    speedInput.value = "300";
    noteSpeed = 300;
    speedVal.textContent = "300 px/s";
    offsetInput.value = "0";
    offsetVal.textContent = "0 ms";
    bgmVol.value = "80";
    bgmVolVal.textContent = "80%";
    player.volume = 0.8;
    companionCountSelect.value = "3";
    audienceCountSelect.value = "22";
    inputModeSelect.value = "mouse";
    document.body.setAttribute("data-input-mode", "mouse");
    keyTimingSelect.value = "down";
    keyJudgeTiming = "down";
    saveSettings();
    refreshBindingUI();
    randomizeStageCast();
    lastJudge.textContent = "設定リセット完了";
    setMeter(2, "#10b981");
}

function setInputMode(mode) {
    inputModeSelect.value = mode;
    document.body.dataset.inputMode = mode;
    inputModeStatus.querySelector("strong").textContent = mode === "touch" ? "TOUCH" : "PC";
    inputModeStatus.querySelector("span").textContent = mode === "touch" ? "LANE" : "KEY+MOUSE";
}

function updateInputModeFromDevice() {
    setInputMode(isTouchDevice() ? "touch" : "mouse");
}

// UI変更イベント連携
trackSelect.addEventListener("change", () => {
    selectTrack(Number(trackSelect.value));
    saveSettings();
});
densitySelect.addEventListener("change", () => {
    if (!isPlaying) {
        resetRunStats();
        updateHUD();
    }
    saveSettings();
});
windowSelect.addEventListener("change", saveSettings);
speedInput.addEventListener("input", () => {
    speedVal.textContent = `${speedInput.value} px/s`;
    noteSpeed = Number(speedInput.value);
    saveSettings();
});
offsetInput.addEventListener("input", () => {
    const value = Number(offsetInput.value);
    offsetVal.textContent = `${value > 0 ? "+" : ""}${value} ms`;
    saveSettings();
});
bgmVol.addEventListener("input", () => {
    bgmVolVal.textContent = `${bgmVol.value}%`;
    player.volume = Number(bgmVol.value) / 100;
    saveSettings();
});
companionCountSelect.addEventListener("change", () => {
    randomizeStageCast();
    saveSettings();
});
audienceCountSelect.addEventListener("change", () => {
    randomizeStageCast();
    saveSettings();
});
inputModeSelect.addEventListener("change", () => {
    document.body.setAttribute("data-input-mode", inputModeSelect.value);
    saveSettings();
});
keyTimingSelect.addEventListener("change", () => {
    keyJudgeTiming = keyTimingSelect.value;
    saveSettings();
});

calibrateBtn.addEventListener("click", resetToDefaultSettings);
randomizeBtn.addEventListener("click", () => {
    if (isPlaying || isPaused || isCountingDown || isApproaching) stopGame();
    if (tracksData.length) {
        const nextIndex = Math.floor(Math.random() * tracksData.length);
        trackSelect.value = String(nextIndex);
        selectTrack(nextIndex);
        saveSettings();
    } else {
        randomizeStageCast();
    }
});
configBtn.addEventListener("click", () => configModal.classList.add("active"));
configCloseBtn.addEventListener("click", () => configModal.classList.remove("active"));

fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
});

// PC キー割り当てボタン
document.querySelectorAll("[data-key-bind]").forEach((btn) => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".bind-key-btn").forEach((b) => b.classList.remove("waiting"));
        btn.classList.add("waiting");
        btn.textContent = "キー入力待ち...";
        waitingBindAttr = btn.dataset.keyBind;
    });
});

document.querySelectorAll(".mouse-bind-select").forEach((sel) => {
    sel.addEventListener("change", () => setMouseBinding(sel.dataset.mouseBind, sel.value));
});

// モーダルアクション
document.getElementById("resume-btn").addEventListener("click", resumeGame);
document.getElementById("restart-btn").addEventListener("click", restartGame);
document.getElementById("exit-btn").addEventListener("click", exitGame);
document.getElementById("res-retry-btn").addEventListener("click", () => {
    resultsModal.classList.remove("active");
    startGame();
});
document.getElementById("res-close-btn").addEventListener("click", () => resultsModal.classList.remove("active"));
document.getElementById("res-stop-btn").addEventListener("click", () => {
    resultsModal.classList.remove("active");
    stopGame();
});

// --- 打鍵入力リスナーの共通登録 ---
// タッチレーン操作
document.querySelectorAll(".touch-lane-hitarea").forEach((lane) => {
    lane.addEventListener("pointerdown", (e) => {
        if (inputModeSelect.value !== "touch") return;
        e.preventDefault();
        flashButton(lane.dataset.attr);
    });
    lane.addEventListener("pointerup", (e) => {
        if (inputModeSelect.value !== "touch") return;
        e.preventDefault();
        judgeInput(lane.dataset.attr);
    });
    lane.addEventListener("contextmenu", (e) => e.preventDefault());
});

document.querySelectorAll(".input-btn").forEach((btn) => {
    btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (inputModeSelect.value === "touch") flashButton(btn.dataset.attr);
    });
    btn.addEventListener("pointerup", (e) => {
        e.preventDefault();
        if (inputModeSelect.value === "touch") judgeInput(btn.dataset.attr);
    });
    btn.addEventListener("contextmenu", (e) => e.preventDefault());
});

// マウス打鍵操作
function isMouseInputBlocked(target) {
    if (configModal.classList.contains("active") || pauseModal.classList.contains("active") || resultsModal.classList.contains("active")) return true;
    return target.closest("#settings-ui, #key-config-panel, #stage-actions, .modal-overlay");
}

document.addEventListener("mousedown", (e) => {
    if (inputModeSelect.value !== "mouse" || isMouseInputBlocked(e.target)) return;
    const attr = getAttributeForMouse(e.button);
    if (attr) {
        e.preventDefault();
        flashButton(attr);
    }
});

document.addEventListener("mouseup", (e) => {
    if (inputModeSelect.value !== "mouse" || isMouseInputBlocked(e.target)) return;
    const attr = getAttributeForMouse(e.button);
    if (attr) {
        e.preventDefault();
        judgeInput(attr);
    }
});

document.addEventListener("contextmenu", (e) => {
    if (inputModeSelect.value === "mouse" && !isMouseInputBlocked(e.target)) {
        e.preventDefault();
    }
});

// キーボード打鍵操作
document.addEventListener("keydown", (e) => {
    if (e.repeat) return;
    if (waitingBindAttr) {
        e.preventDefault();
        if (e.code !== "Escape") {
            setKeyBinding(waitingBindAttr, e.code);
        } else {
            waitingBindAttr = "";
            refreshBindingUI();
        }
        return;
    }
    if (e.key === "Escape") {
        if (configModal.classList.contains("active")) {
            configModal.classList.remove("active");
            return;
        }
        if (!isPlaying) return;
        isPaused ? resumeGame() : pauseGame();
        return;
    }
    if (inputModeSelect.value !== "mouse") return;
    const attr = getAttributeForKey(e.code);
    if (attr) {
        e.preventDefault();
        if (keyJudgeTiming === "up") {
            flashButton(attr);
        } else {
            judgeInput(attr);
        }
    }
});

document.addEventListener("keyup", (e) => {
    if (inputModeSelect.value !== "mouse") return;
    const attr = getAttributeForKey(e.code);
    if (!attr) return;
    e.preventDefault();
    if (keyJudgeTiming === "up") {
        judgeInput(attr);
    }
});

// 画面スケール
function resizeGame() {
    const viewport = window.visualViewport || window;
    const scale = Math.min(viewport.width / 1920, viewport.height / 1080);
    gameContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

window.addEventListener("resize", resizeGame);
resizeGame();
window.addEventListener("load", initExcalibur);
