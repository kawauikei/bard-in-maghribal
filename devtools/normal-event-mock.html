<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Normal Event Mock - Bard in Maghribal</title>
<style>
  /* 基本リセットと画面固定 */
  body { margin: 0; padding: 0; background: #000; color: #eee; overflow: hidden; font-family: "Noto Serif JP", serif; }
  #wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  
  /* 1920x1080 固定キャンバス */
  #app-container {
    position: relative;
    width: 1920px;
    height: 1080px;
    background-color: #0a0a0a;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,1);
    transform-origin: center center;
  }

  /* 1. 最背面：シナリオスチル (全体に敷き、少し暗くぼかす) */
  #scenario-bg {
    position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px; /* ぼかしの端を隠すための余白 */
    background-image: linear-gradient(to bottom, rgba(10,15,20,0.6), rgba(5,5,10,0.9)), url('https://picsum.photos/1920/1080/222/555?text=Scenario+Still+(e.g.+Port+Market)');
    background-size: cover;
    background-position: center;
    filter: blur(8px);
    z-index: 1;
  }

  /* 2. 中央：汎用背景 (3/4サイズ = 1440x810) */
  #generic-bg {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    width: 1440px; height: 810px;
    background-image: url('https://picsum.photos/1440/810/333/666?text=Generic+Background+(e.g.+bg_normal_port_town_day1)');
    background-size: cover;
    background-position: center;
    border: 3px solid #2a2a2a;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    z-index: 2;
  }

  /* 3. 手前：人物ポートレート (汎用背景から少しはみ出すように配置) */
  #portrait-container {
    position: absolute; bottom: 200px; left: 250px;
    width: 600px; height: 800px;
    z-index: 3;
    display: flex; justify-content: center; align-items: flex-end;
  }
  .portrait-placeholder {
    width: 450px; height: 750px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://picsum.photos/450/750/111/444?text=Portrait+(e.g.+Dancer)');
    background-size: cover;
    border-radius: 10px 10px 0 0;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  /* 4. 手前：会話ログ (原則3行前後、画面下部に固定) */
  #message-area {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    width: 1500px; height: 260px;
    z-index: 4;
  }
  
  #speaker-name {
    position: absolute; top: -20px; left: 40px;
    background: linear-gradient(to right, #4a3b2c, #2a2015);
    border: 2px solid #a88b56; border-bottom: none;
    border-radius: 8px 8px 0 0;
    padding: 10px 30px;
    font-size: 26px; color: #f0e6d2; font-weight: bold;
    box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
  }

  #message-box {
    width: 100%; height: 100%;
    background: rgba(15, 15, 15, 0.9);
    border: 3px solid #a88b56; /* 真鍮/ゴールド風の縁取り */
    border-radius: 8px;
    box-sizing: border-box;
    padding: 40px 50px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    position: relative;
  }

  #message-text {
    font-size: 32px;
    line-height: 1.8;
    color: #fff;
    text-shadow: 2px 2px 4px #000;
  }

  /* クリック待ちアイコン (▼) */
  #next-icon {
    position: absolute; bottom: 20px; right: 30px;
    font-size: 30px; color: #ffd700;
    animation: bounce 1s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(10px); }
  }

  /* 右上：システムボタン等 */
  #system-menu {
    position: absolute; top: 20px; right: 20px;
    z-index: 5; display: flex; gap: 15px;
  }
  .sys-btn {
    background: rgba(30, 30, 30, 0.8); border: 2px solid #555;
    color: #ccc; padding: 10px 20px; font-size: 18px; border-radius: 6px;
    cursor: pointer; font-family: inherit; transition: all 0.2s ease;
  }
  .sys-btn:hover { background: rgba(80, 80, 80, 0.9); border-color: #a88b56; color: #fff; }

</style>
</head>
<body>

<div id="wrapper">
  <div id="app-container">
    
    <!-- 1. 最背面：シナリオスチル (ぼかし効果) -->
    <div id="scenario-bg"></div>

    <!-- 2. 中央：汎用背景 (3/4サイズ) -->
    <div id="generic-bg"></div>

    <!-- 3. 手前：人物ポートレート -->
    <div id="portrait-container">
      <div class="portrait-placeholder"></div>
    </div>

    <!-- 4. 手前：会話ログ -->
    <div id="message-area">
      <div id="speaker-name">銀鈴の踊り子 ミレイユ</div>
      <div id="message-box">
        <div id="message-text">
          「あら、新米の詩人さんじゃない？ こんな場所で会うなんて奇遇ね。<br>
          　せっかくだから、私の舞に合わせて一曲弾いてくれない？<br>
          　きっと、お客さんたちも喜ぶと思うわ。」
        </div>
        <div id="next-icon">▼</div>
      </div>
    </div>

    <!-- システムメニュー -->
    <div id="system-menu">
      <button class="sys-btn">Log (ログ)</button>
      <button class="sys-btn">Auto (オート)</button>
      <button class="sys-btn">Skip (スキップ)</button>
      <button class="sys-btn">Menu (メニュー)</button>
    </div>

  </div>
</div>

<script>
  // 1920x1080 contain scale ロジック
  function resize() {
    const container = document.getElementById('app-container');
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    container.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
