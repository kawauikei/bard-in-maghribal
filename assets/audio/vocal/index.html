<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bard in Maghribal - Music Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --done-bg: #dcfce7; --done-text: #166534;
            --pend-bg: #fef3c7; --pend-text: #92400e;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Inter','Noto Sans JP',sans-serif; line-height:1.5; }

        /* ── ヘッダー ── */
        .sticky-header { position: sticky; top:0; z-index:100; background:#fff; border-bottom:1px solid var(--border); }
        header {
            padding: 0.5rem 1rem;
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            gap: 0.5rem; border-bottom: 1px solid #f1f5f9;
        }
        .header-left { display:flex; align-items:center; gap:1rem; flex:1; min-width:200px; }
        .header-brand h1 { font-size:1rem; font-weight:900; color:var(--primary); white-space:nowrap; }
        .header-stats { display:flex; gap:0.75rem; font-size:0.7rem; color:var(--text-muted); }
        .header-stats span { font-weight:700; color:var(--text-main); }
        .header-right { display:flex; align-items:center; gap:0.5rem; flex:1; justify-content:flex-end; min-width:300px; }

        .search-container { max-width:200px; flex:1; position:relative; }
        .search-input { width:100%; padding:0.4rem 0.5rem 0.4rem 1.8rem; border-radius:6px; border:1px solid var(--border); font-size:0.8rem; outline:none; }
        .search-icon { position:absolute; left:0.5rem; top:50%; transform:translateY(-50%); font-size:0.75rem; }

        .filter-group { display:flex; gap:0.3rem; flex-wrap:wrap; }
        .filter-btn { padding:0.35rem 0.6rem; border-radius:4px; font-size:0.7rem; background:white; border:1px solid var(--border); cursor:pointer; color:var(--text-muted); white-space:nowrap; }
        .filter-btn.active { background:var(--primary); color:white; border-color:var(--primary); }

        @media (max-width:600px){
            header { flex-direction:column; align-items:stretch; gap:0.75rem; padding:0.75rem 1rem; }
            .header-left { min-width:0; justify-content:space-between; }
            .header-right { min-width:0; flex-direction:column; align-items:stretch; }
            .search-container { max-width:none; }
            .filter-group { justify-content:space-between; }
            .filter-btn { flex:1; text-align:center; }
            .player-bar { flex-direction:column; align-items:stretch; gap:0.5rem; }
            .player-controls { justify-content:center; }
            main { padding:1rem; }
            .grid { grid-template-columns:1fr; }
        }

        /* ── プレイヤーバー ── */
        .player-bar { display:flex; align-items:center; gap:1rem; background:#f8fafc; padding:0.3rem 1rem; min-height:40px; }
        .player-info { font-size:0.8rem; color:var(--text-muted); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .player-info b { color:var(--text-main); }
        .player-controls { display:flex; align-items:center; gap:0.5rem; }
        .ctrl-btn { background:white; border:1px solid var(--border); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.9rem; transition:all 0.2s; color:var(--text-main); }
        .ctrl-btn:hover { border-color:var(--primary); color:var(--primary); }
        .ctrl-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
        .volume-control { display:flex; align-items:center; gap:0.5rem; margin-left:0.5rem; }
        .volume-slider { width:80px; height:4px; accent-color:var(--primary); cursor:pointer; }
        .volume-icon { font-size:0.9rem; color:var(--text-muted); }

        /* ── グリッド ── */
        main { padding:2rem; max-width:1600px; margin:0 auto; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1.5rem; }

        /* ── カード ── */
        .card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; display:flex; flex-direction:column; gap:0.75rem; box-shadow:var(--shadow); }
        .card.has-audio { border-left:3px solid var(--primary); }

        .card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
        .card-id { font-size:0.7rem; font-weight:700; color:var(--text-muted); font-family:monospace; }
        .card-title { font-size:1rem; font-weight:700; color:var(--text-main); }

        .badge { font-size:0.65rem; font-weight:600; padding:0.2rem 0.45rem; border-radius:4px; white-space:nowrap; }
        .badge.done   { background:var(--done-bg); color:var(--done-text); }
        .badge.pending { background:var(--pend-bg); color:var(--pend-text); }
        .badge.region { background:#ede9fe; color:#5b21b6; }
        .badge.theme  { background:#e0f2fe; color:#0369a1; }

        .card-meta { display:flex; flex-wrap:wrap; gap:0.35rem; }
        .tag { font-size:0.65rem; background:#f1f5f9; color:#475569; padding:0.2rem 0.45rem; border-radius:4px; font-weight:500; }
        .tag.t-inst   { background:#fef3c7; color:#92400e; }
        .tag.t-type   { background:#dcfce7; color:#166534; }
        .tag.t-theme  { background:#ede9fe; color:#5b21b6; }
        .tag.t-region { background:#e0f2fe; color:#0369a1; }
        .tag.t-gen    { background:#f0fdf4; color:#166534; }

        .card-actions { display:flex; gap:0.4rem; margin-top:0.25rem; }
        .btn-view,.btn-copy,.btn-play {
            flex:1; padding:0.4rem; border-radius:4px; font-size:0.75rem; font-weight:600;
            cursor:pointer; transition:all 0.2s; border:1px solid var(--border);
        }
        .btn-view { background:#f8fafc; color:var(--primary); }
        .btn-view:hover { background:#f1f5f9; border-color:var(--primary); }
        .btn-copy { background:var(--primary); color:white; border-color:var(--primary); }
        .btn-copy:hover { background:var(--primary-hover); }
        .btn-copy.success { background:var(--done-text); border-color:var(--done-text); }
        .btn-play { background:#0ea5e9; color:white; border-color:#0ea5e9; }
        .btn-play:hover { background:#0284c7; }
        .btn-play:disabled { background:#cbd5e1; border-color:#cbd5e1; cursor:not-allowed; }

        /* ── モーダル ── */
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,.5); display:none; justify-content:center; align-items:center; z-index:1000; padding:2rem; -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
        .modal.active { display:flex; }
        .modal-inner { background:#fff; width:100%; max-width:800px; max-height:90vh; border-radius:16px; display:flex; flex-direction:column; }
        .modal-header { padding:1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
        .modal-close { font-size:1.5rem; cursor:pointer; color:var(--text-muted); }
        .modal-body { padding:1.5rem; overflow-y:auto; }
        .prompt-content { white-space:pre-wrap; font-size:0.9rem; line-height:1.7; color:#1e293b; background:#f8fafc; padding:1.5rem; border-radius:8px; border:1px solid var(--border); font-family:'Noto Sans JP',sans-serif; }

        .no-result { text-align:center; padding:4rem; color:var(--text-muted); }
    </style>
</head>
<body>

<div class="sticky-header">
    <header>
        <div class="header-left">
            <div class="header-brand"><h1>Bard Console</h1></div>
            <div class="header-stats" id="stats">
                <p>Total: <span id="total-count">0</span></p>
                <p>Gen: <span id="done-count">0</span></p>
                <p>Theme: <span id="theme-count">0</span></p>
                <p>Region: <span id="region-count">0</span></p>
            </div>
        </div>
        <div class="header-right">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search" placeholder="Search..." aria-label="楽曲を検索" title="楽曲を検索">
            </div>
            <div class="filter-group" id="filter-group">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="theme">Theme</button>
                <button class="filter-btn" data-filter="region">Region</button>
                <button class="filter-btn" data-filter="done">Gen</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
            </div>
        </div>
    </header>

    <div class="player-bar">
        <div class="player-info" id="now-playing"><span>Now Playing: </span><b id="current-title">None</b></div>
        <div class="player-controls">
            <button class="ctrl-btn" id="global-loop" title="Toggle Loop">🔁</button>
            <button class="ctrl-btn" id="global-play-pause" title="Play/Pause">▶️</button>
            <div class="volume-control">
                <span class="volume-icon">🔊</span>
                <input type="range" class="volume-slider" id="global-volume" min="0" max="1" step="0.01" value="0.8" aria-label="音量" title="音量">
            </div>
        </div>
        <audio id="main-audio"></audio>
    </div>
</div>

<main>
    <div class="grid" id="grid"></div>
</main>

<div class="modal" id="modal">
    <div class="modal-inner">
        <div class="modal-header">
            <h2 id="modalTitle">Details</h2>
            <span class="modal-close" id="modalClose">&times;</span>
        </div>
        <div class="modal-body">
            <div class="prompt-content" id="modalBody"></div>
        </div>
    </div>
</div>

                "promptContent": "ID 324130\n元ID: 32413\n楽曲タイトル: 割れた茶碗の坂\n\n約60秒の女性ボーカル曲を作成してください。\n\n曲の世界観・詩の前提:\nあらののやどのてんしゅが、われたちゃわんをまどべへおく。 ゆるいさかみちをのぼるように、きもちがかわる。\n地域要素は指定しません。登場人物や出来事の小さな一場面を中心にしてください。\n\n基本テーマは「さいごの　しみを\nちゃわんへ　おく\nまどべの　あたりが\nすこし　とまる\n\nこわくは　ないと\nいいきれない　まま\nゆの　むこうで\nひとつ　いきを　する\n\nこの　しずかな　しずくなら\nかなしく　しすぎず\nやわらかい　はくで\nそばに　おく\n\nこの　とおい　びんなら\nにがい　いとへ\nてのこうで　たしかめ\nかえる　まえに」\n\n使用してよい装飾:\nベル、チャイム、薄いストリングス風の音色、短いネイ風の装飾は少量なら使用してよいです。\nただし主体楽器として前面に出さないでください。\n主体はサントゥールと女性ボーカルです。\n\n避けること:\n長い無音。\n環境音だけのパート。\n語りだけのパート。\n英語主体の歌詞。\n過度な現代EDM。\n過度なロック/メタル。\nサントゥールが聴こえないアレンジ。\nタンゴ感が消えるアレンジ。\n単調な歌詞（繰り返しなど）。\n普通の名詞に不自然な「お」を付ける歌詞。\n",

                "supportTheme": "熱砂",

                "promptContent": "ID 32413C\n元ID: 32413\n楽曲タイトル: 薬草棚の飴・祭りのあと\n\n約60秒の女性ボーカル曲を作成してください。\n\n曲の世界観・詩の前提:\n舞台地域: 緑の隠れ里\n地域の空気: 深い森、木道、水路、葉陰、精霊樹、薬草棚、静かな生活圏\n場面: くすりしがにがいあめをすいろのそばでひやしている。 時間帯は祭りのあと。\n追加の人物主題は指定しません。既存テーマに、この地域場面だけを重ねてください。\n\n基本テーマは「さいごの　しみを\nくすりだなへ　おく\nすいろの　あたりが\nすこし　とまる\n\nこわくは　ないと\nいいきれない　まま\nはかげの　むこうで\nひとつ　いきを　する\n\nこの　かすかな　しずくなら\nかなしく　しすぎず\nやわらかい　はくで\nそばに　おく\n\nこの　うすい　びんなら\nちいさな　いとへ\nてのこうで　たしかめ\nかえる　まえに\n\nこの　あわい　つぼなら\nとおい　すじへ\nてのひらで　たしかめ\nころがる　まえに」\n\n使用してよい装飾:\nベル、チャイム、薄いストリングス風の音色、短いネイ風の装飾は少量なら使用してよいです。\nただし主体楽器として前面に出さないでください。\n主体はサントゥールと女性ボーカルです。\n\n避けること:\n長い無音。\n環境音だけのパート。\n語りだけのパート。\n英語主体の歌詞。\n過度な現代EDM。\n過度なロック/メタル。\nサントゥールが聴こえないアレンジ。\nタンゴ感が消えるアレンジ。\n単調な歌詞（繰り返しなど）。\n普通の名詞に不自然な「お」を付ける歌詞。\n",
                "generated": null

        // ---- 状態 ----
        let currentFilter = 'all';
        let currentSearch = '';
        let isLooping = false;
        let currentTrackId = null;

        const audio = document.getElementById('main-audio');
        const volSlider = document.getElementById('global-volume');
        audio.volume = parseFloat(volSlider.value);

        // ---- 統計 ----
        function updateStats() {
            document.getElementById('total-count').textContent  = tracks.length;
            document.getElementById('done-count').textContent   = tracks.filter(t => t.generated).length;
            document.getElementById('theme-count').textContent  = tracks.filter(t => t.pattern === 'theme').length;
            document.getElementById('region-count').textContent = tracks.filter(t => t.pattern === 'region').length;
        }

        // ---- フィルタ ----
        function applyFilter() {
            const q = currentSearch.toLowerCase();
            const filtered = tracks.filter(t => {
                if (currentFilter === 'theme'   && t.pattern !== 'theme')   return false;
                if (currentFilter === 'region'  && t.pattern !== 'region')  return false;
                if (currentFilter === 'done'    && !t.generated)            return false;
                if (currentFilter === 'pending' && t.generated)             return false;
                if (!q) return true;
                return [t.id, t.title, t.instrument, t.songType, t.mainTheme, t.supportTheme, t.region]
                    .some(v => v && v.toLowerCase().includes(q));
            });
            renderGrid(filtered);
        }

        // ---- カード描画 ----
        function renderGrid(list) {
            const grid = document.getElementById('grid');
            if (!list.length) {
                grid.innerHTML = '<div class="no-result">該当する曲がありません</div>';
                return;
            }
            grid.innerHTML = list.map(cardHTML).join('');
        }

        function cardHTML(t) {
            const hasAudio = !!t.generated;
            const isRegion = t.pattern === 'region';

            const patBadge = isRegion
                ? '<span class="badge region">地域</span>'
                : '<span class="badge theme">テーマ</span>';
            const genBadge = hasAudio
                ? '<span class="badge done">Gen</span>'
                : '<span class="badge pending">Pending</span>';

            const regionTag = isRegion && t.region
                ? `<span class="tag t-region">📍 ${esc(t.region)}</span>` : '';

            const playBtn = hasAudio
                ? `<button class="btn-play" onclick="playTrack('${escA(t.id)}')">▶ 再生</button>`
                : `<button class="btn-play" disabled>▶ 再生</button>`;

            return `
            <div class="card${hasAudio ? ' has-audio' : ''}" data-id="${escA(t.id)}">
                <div class="card-header">
                    <div>
                        <div class="card-id">${esc(t.id)}</div>
                        <div class="card-title">${esc(t.title)}</div>
                    </div>
                    <div style="display:flex;gap:0.3rem;flex-direction:column;align-items:flex-end">
                        ${patBadge}${genBadge}
                    </div>
                </div>
                <div class="card-meta">
                    ${t.instrument   ? `<span class="tag t-inst">🎵 ${esc(t.instrument)}</span>` : ''}
                    ${t.songType     ? `<span class="tag t-type">🎼 ${esc(t.songType)}</span>` : ''}
                    ${t.mainTheme    ? `<span class="tag t-theme">◆ ${esc(t.mainTheme)}</span>` : ''}
                    ${t.supportTheme ? `<span class="tag t-theme">◇ ${esc(t.supportTheme)}</span>` : ''}
                    ${regionTag}
                    ${hasAudio       ? `<span class="tag t-gen">🎧 ${esc(t.generated)}</span>` : ''}
                </div>
                <div class="card-actions">
                    <button class="btn-view" onclick="openModal('${escA(t.id)}')">📄 プロンプト</button>
                    <button class="btn-copy" onclick="copyPrompt('${escA(t.id)}', this)">📋 コピー</button>
                    ${playBtn}
                </div>
            </div>`;
        }

        // ---- モーダル ----
        function openModal(id) {
            const t = tracks.find(x => x.id === id);
            if (!t) return;
            document.getElementById('modalTitle').textContent = `${t.id} — ${t.title}`;
            document.getElementById('modalBody').textContent  = t.promptContent || '（プロンプトなし）';
            document.getElementById('modal').classList.add('active');
        }

        function copyPrompt(id, btn) {
            const t = tracks.find(x => x.id === id);
            if (!t || !t.promptContent) return;
            navigator.clipboard.writeText(t.promptContent).then(() => {
                const orig = btn.textContent;
                btn.textContent = '✅ コピー済';
                btn.classList.add('success');
                setTimeout(() => { btn.textContent = orig; btn.classList.remove('success'); }, 1500);
            }).catch(() => {
                btn.textContent = '❌ 失敗';
                setTimeout(() => { btn.textContent = '📋 コピー'; }, 1500);
            });
        }

        // ---- オーディオ再生 ----
        function playTrack(id) {
            const t = tracks.find(x => x.id === id);
            if (!t || !t.generated) return;
            currentTrackId = id;
            audio.src = t.generated;
            audio.play();
            document.getElementById('current-title').textContent = t.title;
        }

        // ---- イベント ----
        document.getElementById('search').addEventListener('input', e => {
            currentSearch = e.target.value;
            applyFilter();
        });

        document.getElementById('filter-group').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilter();
        });

        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('active');
        });
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal'))
                document.getElementById('modal').classList.remove('active');
        });

        volSlider.addEventListener('input', () => { audio.volume = parseFloat(volSlider.value); });

        document.getElementById('global-play-pause').addEventListener('click', () => {
            if (audio.paused) audio.play(); else audio.pause();
        });

        document.getElementById('global-loop').addEventListener('click', function() {
            isLooping = !isLooping;
            audio.loop = isLooping;
            this.classList.toggle('active', isLooping);
        });

        // ---- 初期化 ----
        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escA(s){ return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

        updateStats();
        applyFilter();
</script>
